# Run `pre-commit install` once; hooks then run on every commit.
# Run on everything with `pre-commit run --all-files` (or `make check`).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block accidental model/audio commits

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff # lint
        args: ["--fix"]
      - id: ruff-format # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: ["numpy>=1.24"]
        args: ["--config-file=pyproject.toml"]
        pass_filenames: false
