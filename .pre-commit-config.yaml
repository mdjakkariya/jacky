# Run `pre-commit install` once; hooks then run on every commit.
# Run on everything with `pre-commit run --all-files` (or `make check`).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"] # block accidental model/audio commits

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff # lint
        args: ["--fix"]
      - id: ruff-format # format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        # The hook runs in an isolated env, so it needs the deps mypy must
        # resolve (pytest is imported by the test suite mypy type-checks too).
        # Mirrors `make check` / CI, where these are already installed.
        additional_dependencies: ["numpy>=1.24", "pytest>=8.0", "keyring>=25", "openai>=1.40"]
        args: ["--config-file=pyproject.toml"]
        pass_filenames: false
