# git-cliff config for the ORB app changelog (CHANGELOG-orb.md). Only orb/ui-scoped
# commits appear here; versions track the `orb-v*` tags. See docs/reference/RELEASING.md.

[changelog]
header = """
# Changelog — Jack orb (macOS app)

Notable changes to the **orb** desktop app. Commits scoped `(orb)`/`(ui)` land here;
CLI/engine changes live in `CHANGELOG-cli.md`. Generated by
[git-cliff](https://git-cliff.org) — don't edit released sections by hand.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="orb-v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
{% if commit.breaking %} **(breaking change)**{% endif %}
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

# Keep ONLY orb/ui-scoped commits, grouped like the CLI changelog; skip everything else.
commit_parsers = [
  { message = "^feat\\((orb|ui)\\)", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix\\((orb|ui)\\)", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf\\((orb|ui)\\)", group = "<!-- 2 -->⚡ Performance & Stability" },
  { message = "^(refactor|style)\\((orb|ui)\\)", group = "<!-- 3 -->🛠️ Improvements" },
  { message = "^docs?\\((orb|ui)\\)", group = "<!-- 4 -->📚 Documentation" },
  { message = "^(chore|build|ci)\\((orb|ui)\\)", group = "<!-- 5 -->🔧 Maintenance" },
  { message = "^revert\\((orb|ui)\\)", group = "<!-- 6 -->⏪ Reverts" },
  { message = ".*", skip = true },
]

filter_commits = false
protect_breaking_commits = false
tag_pattern = "^orb-v[0-9]"
skip_tags = "^orb-v0\\.0\\."
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
