# Continuous integration: lint, type-check, and test on every push / PR.
# Ready to use as soon as this repo is pushed to GitHub.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        # `daemon` (fastapi) is needed so the daemon-server tests run in CI and their
        # coverage counts; without it those tests skip and server.py shows 0% covered.
        # `tui` (rich + prompt_toolkit) is needed so the cli shell type-checks and its
        # tests don't skip. `e2e` (pyte, pure-Python) lets the E2E harness's own unit
        # tests run with fakes (no real PTY) so markers/runner/observe coverage counts.
        run: uv sync --extra dev --extra daemon --extra tui --extra e2e

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy

      - name: Tests (pytest)
        run: uv run pytest

      # Coverage.xml is produced by pytest-cov (see pyproject addopts). The token is
      # read from the CODECOV_TOKEN repo secret (Settings -> Secrets -> Actions).
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # UI unit tests (Vitest + happy-dom). Dev-only toolchain under ui/; nothing here
  # ships — the Tauri webview still loads the raw files. Runs independently of `check`.
  ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install UI deps
        run: npm ci
        working-directory: ui

      - name: UI tests (Vitest)
        run: npm test
        working-directory: ui
