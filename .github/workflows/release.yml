# Publish a release when a version tag (vX.Y.Z) is pushed.
#
# The manifest bump lands on the default branch via a **release PR** (branch
# protection blocks direct pushes — including this workflow's bot — so CI does NOT
# commit a bump back). Pushing the tag on the merged commit triggers this workflow,
# which builds the engine and creates the GitHub Release. CI still sets the *build*
# version from the tag, so the wheel/sdist are correct regardless of the manifests.
#
# Runs on Linux only (macOS CI minutes are ~10x the cost). The macOS orb `.dmg` is
# built locally on a Mac and uploaded to the same Release — see `docs/RELEASING.md`
# (`make bundle` + `make publish-orb`).
name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write # create the GitHub Release and upload assets

jobs:
  # Gate: the same quality checks as CI. The manifest-vs-tag check is non-blocking
  # (a warning) — the release job builds with the tag's version regardless, and the
  # bump itself lands via the release PR, so a mismatch must never abort the release.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest
      - name: Manifest version vs tag (non-blocking)
        run: |
          uv run python scripts/bump_version.py --check "${GITHUB_REF_NAME#v}" \
            || echo "::warning::manifests differ from ${GITHUB_REF_NAME}; the release PR should have bumped them. CI builds with the tag's version regardless."

  release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv python install 3.11

      # Build the artifacts from the *tag* with the version taken from the tag, so
      # the wheel/sdist are always versioned correctly regardless of what's committed.
      - name: Set version from the tag (source of truth)
        run: uv run python scripts/bump_version.py "${GITHUB_REF_NAME#v}"
      - name: Build engine (wheel + sdist)
        run: uv build # -> dist/*.whl, dist/*.tar.gz

      - name: Create the GitHub Release (engine attached; orb .dmg added locally)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: |
            ### Jack ${{ github.ref_name }}

            **Orb app (macOS):** the `.dmg` is uploaded separately (built locally).
            It's an **unsigned dev preview** — first launch, right-click the app →
            **Open** → **Open**, then it runs normally.

            **Engine:** install the attached wheel —
            `uv tool install ./autobot-*.whl` (or `pipx install ./autobot-*.whl`).
            See the README for prerequisites (Ollama or an Anthropic key, the
            STT/TTS models, Microphone + Automation permissions).

      # No bump-back: branch protection blocks direct pushes to the default branch
      # (the bot included), so the manifest bump lands via the release PR instead.
      # See docs/RELEASING.md.
