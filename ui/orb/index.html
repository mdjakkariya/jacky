<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jack</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  /* Dark bg for the standalone/browser view. The Tauri shell sets the window
     transparent and overrides this to `background: transparent`. */
  body {
    background: radial-gradient(120% 120% at 50% 45%, #0E0C18 0%, #05060C 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .stage { position: relative; width: 100vmin; height: 100vmin; max-width: 420px; max-height: 420px; }
  .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  /* Tiny dev-only connection hint; hidden in the Tauri build. */
  #conn {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font: 11px ui-monospace, Menlo, monospace; letter-spacing: .12em;
    color: rgba(157,184,255,.55); user-select: none; pointer-events: none;
  }
  /* Confirmation cards — a macOS-notification-style stack under the orb. */
  #cards {
    position: absolute; left: 50%; bottom: 8px; transform: translateX(-50%);
    width: 92%; max-width: 380px; display: flex; flex-direction: column; gap: 8px;
    z-index: 10; pointer-events: none;
  }
  .card {
    pointer-events: auto;
    background: rgba(28,28,32,.72); -webkit-backdrop-filter: blur(22px); backdrop-filter: blur(22px);
    border: .5px solid rgba(255,255,255,.14); border-radius: 14px;
    box-shadow: 0 8px 30px rgba(0,0,0,.45);
    padding: 11px 13px; color: #fff;
    font: 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    animation: cardIn .18s ease-out;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card .ttl { font-weight: 600; margin-bottom: 2px; }
  .card .msg { opacity: .92; line-height: 1.3; }
  .card .row { display: flex; gap: 8px; margin-top: 9px; }
  .card .btn {
    flex: 1; border: none; border-radius: 9px; padding: 6px 0; cursor: pointer;
    font: 600 12px -apple-system, system-ui, sans-serif; color: #fff;
  }
  .card .btn.no  { background: rgba(255,255,255,.14); }
  .card .btn.yes { background: #2f6fff; }
  .card .btn:active { transform: scale(.97); }
  .card .hint { margin-top: 6px; font-size: 11px; opacity: .5; }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="gl"></canvas>
    <canvas id="ov"></canvas>
    <div id="conn">connecting…</div>
  </div>
  <div id="cards"></div>

<script>
/*
  Jack — live orb client. Renders the locked four-state energy orb (WebGL plasma
  core + 2D overlay cue) and is driven entirely by the daemon's WebSocket:
    {"type":"state","value":"idle|listening|thinking|talking"}
    {"type":"amplitude","value":0.0..1.0}
  No logic lives here — it only reflects engine state. Reconnects automatically.
  Override the socket URL with ?ws=ws://host:port/ws
*/
(function(){
  var params = new URLSearchParams(location.search);
  var WS_URL = params.get("ws") || "ws://127.0.0.1:8765/ws";

  var c=document.getElementById("gl");
  var gl=c.getContext("webgl",{alpha:true,premultipliedAlpha:false,antialias:true});
  var ov=document.getElementById("ov"),o=ov.getContext("2d");
  var conn=document.getElementById("conn");
  if(!gl){conn.textContent="WebGL not available";return;}
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function size(){
    var s=Math.min(c.clientWidth,420);
    c.width=ov.width=Math.round(s*dpr);c.height=ov.height=Math.round(s*dpr);
    gl.viewport(0,0,c.width,c.height);o.setTransform(dpr,0,0,dpr,0,0);
    CX=CY=s/2;orbR=s*0.347;
  }
  var CX,CY,orbR;

  var vs="attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}";
  var fs=[
  "precision highp float;",
  "uniform float u_phase;uniform vec2 u_res;uniform vec3 u_col;uniform float u_rim;uniform float u_amp;uniform float u_energy;",
  "float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}",
  "float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}",
  "float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<6;i++){v+=a*noise(p);p*=2.02;a*=.5;}return v;}",
  "void main(){",
  " vec2 uv=(gl_FragCoord.xy*2.-u_res)/u_res.y;uv*=(1.44-0.04*u_amp);",
  " float r=length(uv);float ang=atan(uv.y,uv.x);float t=u_phase;",
  " float swirl=ang+(1.-r)*2.6+t*0.7;",
  " vec2 q=vec2(swirl*1.1,r*3.2-t*0.9);",
  " float plasma=fbm(q+fbm(q+t*0.25));",
  " float veins=fbm(vec2(swirl*1.9,r*4.5-t*1.7));",
  " veins=1.-abs(veins*2.-1.);veins=pow(veins,7.0);",
  " float dark=smoothstep(0.08,0.5,r);float fall=smoothstep(1.04,0.5,r);",
  " float body=(plasma*0.55+veins*0.9)*dark*fall*u_energy*(0.75+0.6*u_amp);",
  " float rim=smoothstep(0.9,0.99,r)*smoothstep(1.1,0.99,r);",
  " float outer=exp(-max(r-1.0,0.0)*5.0)*0.4;",
  " vec3 col=u_col*(body*1.7+outer);",
  " col+=u_col*(rim*2.6+rim)*u_rim;",
  " col+=vec3(1.0)*veins*dark*fall*0.7;",
  " col+=u_col*smoothstep(0.55,0.0,r)*u_amp*0.6;",
  " float a=clamp(body*1.6+rim*2.2*u_rim+outer,0.0,1.0);",
  " col=col/(col+0.6);col*=1.5;",
  " gl_FragColor=vec4(col,a);",
  "}"].join("\n");
  function sh(ty,src){var s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.warn(gl.getShaderInfoLog(s));return s;}
  var prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(prog);gl.useProgram(prog);
  var bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  var U={};["u_phase","u_res","u_col","u_rim","u_amp","u_energy"].forEach(function(n){U[n]=gl.getUniformLocation(prog,n);});
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  var SC={idle:[0.22,0.50,1.0],listening:[0.15,0.85,1.0],thinking:[0.62,0.36,1.0],talking:[1.0,0.70,0.14]};
  var SP={idle:{speed:0.45,energy:0.8},listening:{speed:0.9,energy:1.05},thinking:{speed:1.9,energy:1.05},talking:{speed:1.0,energy:1.2}};

  // Driven by the daemon:
  var state="idle";       // last state frame
  var liveAmp=0.0;        // last amplitude frame (decays between frames)

  function rgba(cc,a){return "rgba("+Math.round(cc[0]*255)+","+Math.round(cc[1]*255)+","+Math.round(cc[2]*255)+","+a+")";}
  var cur={col:SC.idle.slice(),speed:0.45,energy:0.8,amp:0.0};
  var rings=[],ringTimer=0,spin=0,rim=0.04,phase=0,last=performance.now(),start=performance.now();

  function overlay(dt,t){
    o.clearRect(0,0,ov.width/dpr,ov.height/dpr);var cc=cur.col;
    if(state==="listening"){
      ringTimer+=dt;if(ringTimer>0.55){ringTimer=0;rings.push({r:orbR-6});}
      for(var i=rings.length-1;i>=0;i--){var R=rings[i];R.r+=dt*46;var pr=(R.r-(orbR-6))/64;if(pr>=1){rings.splice(i,1);continue;}
        o.beginPath();o.arc(CX,CY,R.r,0,Math.PI*2);o.strokeStyle=rgba(cc,(1-pr)*0.5);o.lineWidth=2.2;o.stroke();}
    }else if(state==="thinking"){
      spin+=dt*3.2;var seg=26,base=orbR+13;
      for(var k=0;k<seg;k++){var a=spin-k*0.12;var al=(1-k/seg)*0.7;
        o.beginPath();o.arc(CX,CY,base,a,a+0.1);o.strokeStyle=rgba(cc,al);o.lineWidth=3.2;o.lineCap="round";o.stroke();}
      o.beginPath();o.arc(CX+Math.cos(spin)*base,CY+Math.sin(spin)*base,3.4,0,Math.PI*2);o.fillStyle="rgba(255,255,255,0.95)";o.fill();
    }else if(state==="talking"){
      var n=64,base=orbR+6;
      for(var j=0;j<n;j++){var ang=j/n*Math.PI*2;
        var L=4+Math.abs(Math.sin(ang*5+t*9))*14*(0.4+cur.amp)+Math.abs(Math.sin(ang*11-t*6))*7*cur.amp;
        var x1=CX+Math.cos(ang)*base,y1=CY+Math.sin(ang)*base,x2=CX+Math.cos(ang)*(base+L),y2=CY+Math.sin(ang)*(base+L);
        o.beginPath();o.moveTo(x1,y1);o.lineTo(x2,y2);o.strokeStyle=rgba(cc,0.55);o.lineWidth=2.4;o.lineCap="round";o.stroke();}
    }else{
      var br=orbR+10+Math.sin(t*1.3)*4;o.beginPath();o.arc(CX,CY,br,0,Math.PI*2);o.strokeStyle=rgba(cc,0.12);o.lineWidth=1.4;o.stroke();
    }
  }
  function frame(){
    var now=performance.now(),dt=Math.min((now-last)/1000,0.05);last=now;var t=(now-start)/1000;
    var tc=SC[state]||SC.idle,tp=SP[state]||SP.idle;
    for(var i=0;i<3;i++)cur.col[i]+=(tc[i]-cur.col[i])*0.06;
    cur.speed+=(tp.speed-cur.speed)*0.05;cur.energy+=(tp.energy-cur.energy)*0.05;
    // Amplitude is only meaningful while listening/talking; decay it otherwise.
    var reactive=(state==="listening"||state==="talking");
    cur.amp+=((reactive?liveAmp:0.0)-cur.amp)*0.25;
    liveAmp*=0.90; // fade if no fresh frame arrives
    phase+=dt*cur.speed;
    gl.uniform1f(U.u_phase,phase);gl.uniform2f(U.u_res,c.width,c.height);gl.uniform1f(U.u_rim,rim);
    gl.uniform1f(U.u_amp,cur.amp);gl.uniform1f(U.u_energy,cur.energy);gl.uniform3f(U.u_col,cur.col[0],cur.col[1],cur.col[2]);
    gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);gl.drawArrays(gl.TRIANGLES,0,3);
    overlay(dt,t);
    requestAnimationFrame(frame);
  }

  // --- daemon connection -------------------------------------------------
  var ws=null,retry=null;
  function connect(){
    conn.textContent="connecting…";
    try{ws=new WebSocket(WS_URL);}catch(e){scheduleReconnect();return;}
    ws.onopen=function(){conn.textContent="";};
    ws.onmessage=function(ev){
      var msg;try{msg=JSON.parse(ev.data);}catch(e){return;}
      if(msg.type==="state"&&SC[msg.value]){var prev=state;state=msg.value;if(prev!==state)onStateChange(prev,state);}
      else if(msg.type==="amplitude"){liveAmp=Math.max(0,Math.min(1,+msg.value||0));}
      else if(msg.type==="visibility"){ if(msg.value==="hide") requestHide(); else showOrb(); }
      else if(msg.type==="confirm"){ showCard(msg.text); }
      else if(msg.type==="confirm_clear"){ clearCards(); }
    };
    ws.onclose=function(){scheduleReconnect();};
    ws.onerror=function(){try{ws.close();}catch(e){}};
  }
  function scheduleReconnect(){
    conn.textContent="reconnecting…";
    clearTimeout(retry);retry=setTimeout(connect,1000);
  }

  // --- confirmation cards (macOS-notification style) ----------------------
  // A persistent card stack under the orb. Answer by voice ("proceed"/"cancel")
  // OR by clicking — the click POSTs to the daemon, which hands it to the engine.
  var API_BASE = WS_URL.replace(/^ws/,"http").replace(/\/ws$/,"");
  function showCard(text){
    try{ showOrb(); }catch(e){}   // make sure the orb is visible so the card shows
    var cards=document.getElementById("cards"); if(!cards) return;
    var el=document.createElement("div"); el.className="card";
    el.innerHTML='<div class="ttl">Confirm</div><div class="msg"></div>'
      + '<div class="row"><button class="btn no">Cancel</button>'
      + '<button class="btn yes">Proceed</button></div>'
      + '<div class="hint">…or say “proceed” / “cancel”.</div>';
    el.querySelector(".msg").textContent = text || "Are you sure?";
    el.querySelector(".yes").addEventListener("click",function(){ sendConfirm(true); });
    el.querySelector(".no").addEventListener("click",function(){ sendConfirm(false); });
    cards.appendChild(el);
    growForCards();
  }
  function sendConfirm(answer){
    try{
      fetch(API_BASE+"/confirm",{method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({answer:answer})});
    }catch(e){}
    clearCards();   // optimistic; the engine also sends confirm_clear
  }
  function clearCards(){
    var cards=document.getElementById("cards"); if(cards) cards.innerHTML="";
    restoreSize();
  }

  // Grow the orb window so the card isn't clipped, restore when cleared (Tauri).
  var _baseSize=null;
  function growForCards(){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalSize) return;
    var cards=document.getElementById("cards"); if(!cards) return;
    tauriWin.outerSize().then(function(sz){
      if(!_baseSize) _baseSize={w:sz.width,h:sz.height};
      var extra=Math.round((cards.offsetHeight+24)*(window.devicePixelRatio||1));
      tauriWin.setSize(new tauriApi.PhysicalSize(_baseSize.w, _baseSize.h+extra));
    }).catch(function(){});
  }
  function restoreSize(){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalSize||!_baseSize) return;
    tauriWin.setSize(new tauriApi.PhysicalSize(_baseSize.w,_baseSize.h));
    _baseSize=null;
  }

  // --- "come to me": glide to the active screen when engaged (Tauri only) ----
  // OFF by default: the orb stays parked wherever you put it. Opt in by setting
  // localStorage "jackComeForward" to "1" to have it glide to centre-top while
  // engaged and slide back when done.
  var tauriApi=null,tauriWin=null,suppressSave=false,parkedPos=null,animTok=0;
  var ENGAGED={listening:1,thinking:1,talking:1};
  function comeForwardEnabled(){ try{return localStorage.getItem("jackComeForward")==="1";}catch(e){return false;} }
  function onStateChange(prev,next){
    if(!tauriWin) return;
    // Presence: any engaged state shows the orb (this is how the wake word brings
    // it back); returning to idle either honors a pending dismiss or restarts the
    // idle auto-hide countdown.
    if(next!=="idle") showOrb();
    else if(pendingHide) hideOrb();
    else scheduleIdleHide();
    // Come-to-me glide (independent feature, separately toggleable).
    if(comeForwardEnabled()){
      var was=ENGAGED[prev],now=ENGAGED[next];
      if(!was&&now) comeForward();
      else if(was&&!now) goBack();
    }
  }

  // --- auto-hide on idle + dismiss-by-voice (Tauri only) -----------------
  // The orb tucks itself away after a spell of inactivity and reappears the
  // moment Jack is engaged again (the wake word). Saying "go away" hides it too,
  // but only after Jack finishes the goodbye — so we defer the hide until idle.
  var IDLE_HIDE_MS=30000, idleTimer=null, orbHidden=false, pendingHide=false;
  function autoHideEnabled(){ try{return localStorage.getItem("jackAutoHide")!=="0";}catch(e){return true;} }
  function hideOrb(){
    pendingHide=false; clearTimeout(idleTimer); idleTimer=null;
    if(!tauriWin||orbHidden) return;
    orbHidden=true; if(tauriWin.hide) tauriWin.hide();
  }
  function showOrb(){
    clearTimeout(idleTimer); idleTimer=null;
    if(!tauriWin||!orbHidden) return;
    orbHidden=false;
    if(tauriWin.show) tauriWin.show();
    // Re-assert floating behavior in case show() reset it.
    if(tauriWin.setAlwaysOnTop) tauriWin.setAlwaysOnTop(true);
    if(tauriWin.setVisibleOnAllWorkspaces) tauriWin.setVisibleOnAllWorkspaces(true);
  }
  function scheduleIdleHide(){
    clearTimeout(idleTimer); idleTimer=null;
    if(!tauriWin||!autoHideEnabled()) return;
    idleTimer=setTimeout(hideOrb,IDLE_HIDE_MS);
  }
  function requestHide(){
    if(!tauriWin) return;
    if(state==="idle") hideOrb(); else pendingHide=true;  // wait for the goodbye
  }
  function glideTo(tx,ty){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalPosition) return;
    var P=tauriApi.PhysicalPosition,tok=++animTok;
    tauriWin.outerPosition().then(function(cur){
      var sx=cur.x,sy=cur.y,steps=18,i=0;suppressSave=true;
      (function step(){
        if(tok!==animTok) return;
        i++;var e=i/steps,k=1-Math.pow(1-e,3);
        tauriWin.setPosition(new P(Math.round(sx+(tx-sx)*k),Math.round(sy+(ty-sy)*k)));
        if(i>=steps){ setTimeout(function(){ if(tok===animTok) suppressSave=false; },150); return; }
        setTimeout(step,16);
      })();
    }).catch(function(){});
  }
  function comeForward(){
    if(!tauriApi.currentMonitor) return;
    Promise.all([tauriWin.outerPosition(),tauriApi.currentMonitor(),tauriWin.outerSize()]).then(function(r){
      if(!parkedPos) parkedPos=r[0];
      var mon=r[1],sz=r[2]; if(!mon) return;
      var tx=mon.position.x+Math.round((mon.size.width-sz.width)/2);
      var ty=mon.position.y+Math.round(mon.size.height*0.18);
      glideTo(tx,ty);
    }).catch(function(e){console.warn("comeForward",e);});
  }
  function goBack(){
    if(!parkedPos) return;
    var p=parkedPos;parkedPos=null;glideTo(p.x,p.y);
  }

  window.addEventListener("resize",size);
  size();connect();frame();

  // --- Tauri shell integration (no-op in a plain browser) ----------------
  // When loaded inside the Tauri window (withGlobalTauri), make the page
  // transparent, hide the dev hint, keep it floating on top of every Space, and
  // let the user drag the orb anywhere by grabbing it.
  if (window.__TAURI__ && window.__TAURI__.window){
    try{
      document.body.style.background="transparent";
      if(conn) conn.style.display="none";
      var api=window.__TAURI__.window;
      var win=(api.getCurrentWindow||api.getCurrent).call(api);
      tauriApi=api; tauriWin=win;   // shared with the "come to me" glide logic
      if(win.setAlwaysOnTop) win.setAlwaysOnTop(true);
      if(win.setVisibleOnAllWorkspaces) win.setVisibleOnAllWorkspaces(true);
      var stage=document.querySelector(".stage");
      if(stage) stage.addEventListener("mousedown",function(){ if(win.startDragging) win.startDragging(); });

      // Remember where the user parked the orb (persists across launches via the
      // webview's localStorage). onMoved gives a physical-pixel position.
      var POS_KEY="jackOrbPos", PhysPos=api.PhysicalPosition;
      try{
        var saved=JSON.parse(localStorage.getItem(POS_KEY)||"null");
        if(saved && PhysPos && typeof saved.x==="number") win.setPosition(new PhysPos(saved.x,saved.y));
      }catch(e){}
      if(win.onMoved) win.onMoved(function(ev){
        if(suppressSave) return;   // ignore programmatic glides — keep the parked spot
        var p=ev&&ev.payload?ev.payload:ev;
        if(p && typeof p.x==="number") localStorage.setItem(POS_KEY, JSON.stringify({x:p.x,y:p.y}));
      });

      // Remember the chosen size too (set from the tray's Small/Medium/Large).
      var SIZE_KEY="jackOrbSize", PhysSize=api.PhysicalSize;
      try{
        var sz=JSON.parse(localStorage.getItem(SIZE_KEY)||"null");
        if(sz && PhysSize && typeof sz.w==="number") win.setSize(new PhysSize(sz.w,sz.h));
      }catch(e){}
      if(win.onResized) win.onResized(function(ev){
        var s=ev&&ev.payload?ev.payload:ev;
        if(s && typeof s.width==="number") localStorage.setItem(SIZE_KEY, JSON.stringify({w:s.width,h:s.height}));
      });

      // Fresh launch starts idle — begin the auto-hide countdown so an untouched
      // orb tucks itself away (it returns on the wake word).
      scheduleIdleHide();
    }catch(e){ console.warn("tauri init failed",e); }
  }
})();
</script>
</body>
</html>
