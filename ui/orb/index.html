<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jack</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; overflow: hidden; }
  /* Dark bg for the standalone/browser view. The Tauri shell sets the window
     transparent and overrides this to `background: transparent`. */
  body {
    background: radial-gradient(120% 120% at 50% 45%, #0E0C18 0%, #05060C 100%);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .stage { position: relative; width: 100vmin; height: 100vmin; max-width: 420px; max-height: 420px; }
  .stage canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  /* Tiny dev-only connection hint; hidden in the Tauri build. */
  #conn {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font: 11px ui-monospace, Menlo, monospace; letter-spacing: .12em;
    color: rgba(157,184,255,.55); user-select: none; pointer-events: none;
  }
  /* macOS-notification-style cards (confirmations + voice search results), shown
     under the orb. One component, two uses, built for legibility + accessibility. */
  #cards {
    position: absolute; left: 50%; bottom: 10px; transform: translateX(-50%);
    width: calc(100% - 20px); max-width: 360px;
    display: flex; flex-direction: column; gap: 8px; z-index: 10; pointer-events: none;
  }
  /* When a card is up, stack a small orb above it (no overlap) and flow the card
     in normal layout so the window can size to fit both. */
  body.has-card { flex-direction: column; justify-content: flex-start; padding-top: 12px; }
  body.has-card .stage {
    width: 116px; height: 116px; max-width: 116px; max-height: 116px; flex: 0 0 auto;
  }
  body.has-card #cards {
    position: static; transform: none; margin: 8px auto 0; width: calc(100% - 24px);
  }
  .card {
    pointer-events: auto; color: #fff; text-align: left;
    background: rgba(34,34,38,.82);
    -webkit-backdrop-filter: blur(28px) saturate(140%); backdrop-filter: blur(28px) saturate(140%);
    border: .5px solid rgba(255,255,255,.16); border-radius: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,.5);
    padding: 13px 14px;
    font: 13px -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    animation: cardIn .18s ease-out;
  }
  @keyframes cardIn { from { opacity: 0; transform: translateY(8px) scale(.985); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } }
  /* Header: a Jack "app icon" + title (+ body), like a notification. */
  .card .hd { display: grid; grid-template-columns: 30px 1fr; gap: 11px; align-items: start; }
  .card .ic {
    width: 30px; height: 30px; border-radius: 8px; font-size: 15px; flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(120% 120% at 35% 25%, #b884ff 0%, #7a3ff0 55%, #4a1fb8 100%);
    box-shadow: 0 2px 8px rgba(120,60,240,.45);
  }
  .card .tx { min-width: 0; }
  .card .ttl { font-weight: 650; font-size: 13px; }
  .card .msg { margin-top: 2px; font-size: 13px; line-height: 1.38; opacity: .92; overflow-wrap: anywhere; }
  /* Actions: right-aligned, comfortable tap targets. */
  .card .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
  .card .btn {
    border: none; border-radius: 9px; padding: 7px 16px; min-height: 30px; cursor: pointer;
    font: 600 12.5px -apple-system, system-ui, sans-serif; color: #fff;
    background: rgba(255,255,255,.16); transition: filter .12s ease, transform .06s ease;
  }
  .card .btn.yes { background: #2f6fff; }
  .card.danger .btn.yes { background: #ff453a; }
  .card .btn:hover { filter: brightness(1.12); }
  .card .btn:active { transform: scale(.97); }
  .card .btn:focus-visible { outline: 2px solid #9db8ff; outline-offset: 2px; }
  .card .btn:disabled { opacity: .5; cursor: default; }
  .card .hint { margin-top: 9px; font-size: 11px; opacity: .5; }
  /* Voice search preview: a list of top file matches, each with actions. */
  .card .list { margin-top: 10px; }
  .card .citem { padding: 8px 0; border-top: .5px solid rgba(255,255,255,.10); }
  .card .citem:first-child { border-top: none; padding-top: 2px; }
  .card .cname { font-weight: 600; font-size: 12.5px; overflow-wrap: anywhere; }
  .card .csub { font-size: 11px; opacity: .55; overflow-wrap: anywhere; margin-top: 1px; }
  .card .crow { display: flex; gap: 6px; margin-top: 7px; }
  .card .crow .btn { padding: 5px 13px; }
  .card .cstatus { font-size: 11px; opacity: .85; margin-top: 6px; color: #7fd4a0; }
  .card .cstatus:empty { display: none; }
  /* Off-screen live region so VoiceOver announces the prompt/results. */
  .a11y-live {
    position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0;
    overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
  }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="gl"></canvas>
    <canvas id="ov"></canvas>
    <div id="conn">connecting…</div>
  </div>
  <div id="cards"></div>
  <div id="a11y-live" class="a11y-live" role="status" aria-live="assertive"></div>

<script>
/*
  Jack — live orb client. Renders the locked four-state energy orb (WebGL plasma
  core + 2D overlay cue) and is driven entirely by the daemon's WebSocket:
    {"type":"state","value":"idle|listening|thinking|talking"}
    {"type":"amplitude","value":0.0..1.0}
  No logic lives here — it only reflects engine state. Reconnects automatically.
  Override the socket URL with ?ws=ws://host:port/ws
*/
(function(){
  var params = new URLSearchParams(location.search);
  var WS_URL = params.get("ws") || "ws://127.0.0.1:8765/ws";

  var c=document.getElementById("gl");
  var gl=c.getContext("webgl",{alpha:true,premultipliedAlpha:false,antialias:true});
  var ov=document.getElementById("ov"),o=ov.getContext("2d");
  var conn=document.getElementById("conn");
  if(!gl){conn.textContent="WebGL not available";return;}
  var dpr=Math.min(window.devicePixelRatio||1,2);
  function size(){
    var s=Math.min(c.clientWidth,420);
    c.width=ov.width=Math.round(s*dpr);c.height=ov.height=Math.round(s*dpr);
    gl.viewport(0,0,c.width,c.height);o.setTransform(dpr,0,0,dpr,0,0);
    CX=CY=s/2;orbR=s*0.347;
  }
  var CX,CY,orbR;

  var vs="attribute vec2 p;void main(){gl_Position=vec4(p,0.0,1.0);}";
  var fs=[
  "precision highp float;",
  "uniform float u_phase;uniform vec2 u_res;uniform vec3 u_col;uniform float u_rim;uniform float u_amp;uniform float u_energy;",
  "float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}",
  "float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1.,0.)),c=hash(i+vec2(0.,1.)),d=hash(i+vec2(1.,1.));vec2 u=f*f*(3.-2.*f);return mix(mix(a,b,u.x),mix(c,d,u.x),u.y);}",
  "float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<6;i++){v+=a*noise(p);p*=2.02;a*=.5;}return v;}",
  "void main(){",
  " vec2 uv=(gl_FragCoord.xy*2.-u_res)/u_res.y;uv*=(1.44-0.04*u_amp);",
  " float r=length(uv);float ang=atan(uv.y,uv.x);float t=u_phase;",
  " float swirl=ang+(1.-r)*2.6+t*0.7;",
  " vec2 q=vec2(swirl*1.1,r*3.2-t*0.9);",
  " float plasma=fbm(q+fbm(q+t*0.25));",
  " float veins=fbm(vec2(swirl*1.9,r*4.5-t*1.7));",
  " veins=1.-abs(veins*2.-1.);veins=pow(veins,7.0);",
  " float dark=smoothstep(0.08,0.5,r);float fall=smoothstep(1.04,0.5,r);",
  " float body=(plasma*0.55+veins*0.9)*dark*fall*u_energy*(0.75+0.6*u_amp);",
  " float rim=smoothstep(0.9,0.99,r)*smoothstep(1.1,0.99,r);",
  " float outer=exp(-max(r-1.0,0.0)*5.0)*0.4;",
  " vec3 col=u_col*(body*1.7+outer);",
  " col+=u_col*(rim*2.6+rim)*u_rim;",
  " col+=vec3(1.0)*veins*dark*fall*0.7;",
  " col+=u_col*smoothstep(0.55,0.0,r)*u_amp*0.6;",
  " float a=clamp(body*1.6+rim*2.2*u_rim+outer,0.0,1.0);",
  " col=col/(col+0.6);col*=1.5;",
  " gl_FragColor=vec4(col,a);",
  "}"].join("\n");
  function sh(ty,src){var s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.warn(gl.getShaderInfoLog(s));return s;}
  var prog=gl.createProgram();gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));gl.linkProgram(prog);gl.useProgram(prog);
  var bf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,bf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  var U={};["u_phase","u_res","u_col","u_rim","u_amp","u_energy"].forEach(function(n){U[n]=gl.getUniformLocation(prog,n);});
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  var SC={idle:[0.22,0.50,1.0],listening:[0.15,0.85,1.0],thinking:[0.62,0.36,1.0],talking:[1.0,0.70,0.14]};
  var SP={idle:{speed:0.45,energy:0.8},listening:{speed:0.9,energy:1.05},thinking:{speed:1.9,energy:1.05},talking:{speed:1.0,energy:1.2}};

  // Driven by the daemon:
  var state="idle";       // last state frame
  var liveAmp=0.0;        // last amplitude frame (decays between frames)

  function rgba(cc,a){return "rgba("+Math.round(cc[0]*255)+","+Math.round(cc[1]*255)+","+Math.round(cc[2]*255)+","+a+")";}
  var cur={col:SC.idle.slice(),speed:0.45,energy:0.8,amp:0.0};
  var rings=[],ringTimer=0,spin=0,rim=0.04,phase=0,last=performance.now(),start=performance.now();

  function overlay(dt,t){
    o.clearRect(0,0,ov.width/dpr,ov.height/dpr);var cc=cur.col;
    if(state==="listening"){
      ringTimer+=dt;if(ringTimer>0.55){ringTimer=0;rings.push({r:orbR-6});}
      for(var i=rings.length-1;i>=0;i--){var R=rings[i];R.r+=dt*46;var pr=(R.r-(orbR-6))/64;if(pr>=1){rings.splice(i,1);continue;}
        o.beginPath();o.arc(CX,CY,R.r,0,Math.PI*2);o.strokeStyle=rgba(cc,(1-pr)*0.5);o.lineWidth=2.2;o.stroke();}
    }else if(state==="thinking"){
      spin+=dt*3.2;var seg=26,base=orbR+13;
      for(var k=0;k<seg;k++){var a=spin-k*0.12;var al=(1-k/seg)*0.7;
        o.beginPath();o.arc(CX,CY,base,a,a+0.1);o.strokeStyle=rgba(cc,al);o.lineWidth=3.2;o.lineCap="round";o.stroke();}
      o.beginPath();o.arc(CX+Math.cos(spin)*base,CY+Math.sin(spin)*base,3.4,0,Math.PI*2);o.fillStyle="rgba(255,255,255,0.95)";o.fill();
    }else if(state==="talking"){
      var n=64,base=orbR+6;
      for(var j=0;j<n;j++){var ang=j/n*Math.PI*2;
        var L=4+Math.abs(Math.sin(ang*5+t*9))*14*(0.4+cur.amp)+Math.abs(Math.sin(ang*11-t*6))*7*cur.amp;
        var x1=CX+Math.cos(ang)*base,y1=CY+Math.sin(ang)*base,x2=CX+Math.cos(ang)*(base+L),y2=CY+Math.sin(ang)*(base+L);
        o.beginPath();o.moveTo(x1,y1);o.lineTo(x2,y2);o.strokeStyle=rgba(cc,0.55);o.lineWidth=2.4;o.lineCap="round";o.stroke();}
    }else{
      var br=orbR+10+Math.sin(t*1.3)*4;o.beginPath();o.arc(CX,CY,br,0,Math.PI*2);o.strokeStyle=rgba(cc,0.12);o.lineWidth=1.4;o.stroke();
    }
  }
  function frame(){
    var now=performance.now(),dt=Math.min((now-last)/1000,0.05);last=now;var t=(now-start)/1000;
    var tc=SC[state]||SC.idle,tp=SP[state]||SP.idle;
    for(var i=0;i<3;i++)cur.col[i]+=(tc[i]-cur.col[i])*0.06;
    cur.speed+=(tp.speed-cur.speed)*0.05;cur.energy+=(tp.energy-cur.energy)*0.05;
    // Amplitude is only meaningful while listening/talking; decay it otherwise.
    var reactive=(state==="listening"||state==="talking");
    cur.amp+=((reactive?liveAmp:0.0)-cur.amp)*0.25;
    liveAmp*=0.90; // fade if no fresh frame arrives
    phase+=dt*cur.speed;
    gl.uniform1f(U.u_phase,phase);gl.uniform2f(U.u_res,c.width,c.height);gl.uniform1f(U.u_rim,rim);
    gl.uniform1f(U.u_amp,cur.amp);gl.uniform1f(U.u_energy,cur.energy);gl.uniform3f(U.u_col,cur.col[0],cur.col[1],cur.col[2]);
    gl.clearColor(0,0,0,0);gl.clear(gl.COLOR_BUFFER_BIT);gl.drawArrays(gl.TRIANGLES,0,3);
    overlay(dt,t);
    requestAnimationFrame(frame);
  }

  // --- daemon connection -------------------------------------------------
  var ws=null,retry=null;
  function connect(){
    conn.textContent="connecting…";
    try{ws=new WebSocket(WS_URL);}catch(e){scheduleReconnect();return;}
    ws.onopen=function(){conn.textContent=""; checkSetup();};
    ws.onmessage=function(ev){
      var msg;try{msg=JSON.parse(ev.data);}catch(e){return;}
      if(msg.type==="state"&&SC[msg.value]){var prev=state;state=msg.value;if(prev!==state)onStateChange(prev,state);}
      else if(msg.type==="amplitude"){liveAmp=Math.max(0,Math.min(1,+msg.value||0));}
      else if(msg.type==="visibility"){ if(msg.value==="hide") requestHide(); else showOrb(); }
      else if(msg.type==="confirm"){ if(msg.mode!=="chat"){ clearChoices(); showCard(msg.text, msg.kind); } }
      else if(msg.type==="confirm_clear"){ clearCards(); }
      else if(msg.type==="choices"){ if(msg.mode==="voice") showChoicesCard(msg); }
    };
    ws.onclose=function(){scheduleReconnect();};
    ws.onerror=function(){try{ws.close();}catch(e){}};
  }
  // First run is chat-first: we do NOT auto-open Settings anymore. A fresh install
  // should land in the chat drawer only; Settings stays available from the tray menu
  // (and the Voice toggle routes there when voice models need downloading).
  function checkSetup(){ /* intentionally a no-op — see note above */ }

  function scheduleReconnect(){
    conn.textContent="reconnecting…";
    clearTimeout(retry);retry=setTimeout(connect,1000);
  }

  // --- confirmation cards (macOS-notification style) ----------------------
  // A persistent card stack under the orb. Answer by voice ("proceed"/"cancel")
  // OR by clicking — the click POSTs to the daemon, which hands it to the engine.
  var API_BASE = WS_URL.replace(/^ws/,"http").replace(/\/ws$/,"");
  // Announce text to screen readers via the off-screen assertive live region.
  // Clearing first then setting (next tick) makes VoiceOver re-read identical text.
  function announce(text){
    var el=document.getElementById("a11y-live"); if(!el) return;
    el.textContent=""; setTimeout(function(){ el.textContent=text||""; }, 40);
  }
  // Confirmation card: an accessible alert dialog (icon + title + body + actions).
  // Answer by voice ("proceed"/"cancel"), by click, or by keyboard (Esc cancels;
  // Tab cycles the buttons). Focus defaults to the SAFE choice on destructive asks.
  function showCard(text, kind){
    try{ showOrb(); }catch(e){}   // make sure the orb is visible so the card shows
    var cards=document.getElementById("cards"); if(!cards) return;
    var old=document.getElementById("confirm-card"); if(old) old.remove();  // one at a time
    kind = kind || "danger";
    var ttl = kind === "read" ? "Allow access" : (kind === "write" ? "Allow change" : "Confirm");
    var icon = kind === "read" ? "🔒" : (kind === "write" ? "✎" : "⚠️");
    var yes = kind === "danger" ? "Proceed" : "Allow";
    var no = kind === "danger" ? "Cancel" : "Not now";
    var el=document.createElement("div"); el.className="card " + kind; el.id="confirm-card";
    el.setAttribute("role","alertdialog");
    el.setAttribute("aria-labelledby","cf-ttl");
    el.setAttribute("aria-describedby","cf-msg");
    el.innerHTML='<div class="hd"><div class="ic" aria-hidden="true"></div>'
      + '<div class="tx"><div class="ttl" id="cf-ttl"></div><div class="msg" id="cf-msg"></div></div></div>'
      + '<div class="row"><button type="button" class="btn no"></button>'
      + '<button type="button" class="btn yes"></button></div>'
      + '<div class="hint">…or say “' + (kind==="danger"?"proceed":"allow") + '” / “cancel”.</div>';
    el.querySelector(".ic").textContent = icon;
    el.querySelector(".ttl").textContent = ttl;
    el.querySelector(".msg").textContent = text || "Are you sure?";
    var noBtn=el.querySelector(".no"), yesBtn=el.querySelector(".yes");
    noBtn.textContent = no; yesBtn.textContent = yes;
    noBtn.setAttribute("aria-label", no + " — " + ttl);
    yesBtn.setAttribute("aria-label", yes + " — " + ttl);
    yesBtn.addEventListener("click",function(){ sendConfirm(true); });
    noBtn.addEventListener("click",function(){ sendConfirm(false); });
    cards.appendChild(el);
    enterCardMode();
    announce(ttl + ". " + (text || ""));
    // Destructive → focus Cancel (a stray Enter shouldn't delete); else the action.
    setTimeout(function(){ (kind==="danger"?noBtn:yesBtn).focus(); }, 50);
  }
  function sendConfirm(answer){
    try{
      fetch(API_BASE+"/confirm",{method:"POST",
        headers:{"content-type":"application/json"},
        body:JSON.stringify({answer:answer})});
    }catch(e){}
    clearCards();   // optimistic; the engine also sends confirm_clear
  }
  function clearCards(){
    var cards=document.getElementById("cards"); if(cards) cards.innerHTML="";
    exitCardMode();
  }

  // --- voice search preview ------------------------------------------------
  // In voice mode a file search shows its top matches as a transient card on the
  // orb (the chat drawer has its own list). Act by voice ("open the first one"), by
  // tapping Open/Reveal, or by keyboard (Esc dismisses). It clears when the next turn
  // starts, so a stale preview never lingers — and because it lives on the orb, it
  // can't leak into the chat log.
  function clearChoices(){
    var el=document.getElementById("choices-card");
    if(el){ el.remove(); if(!cardsPresent()) exitCardMode(); }
  }
  function runChoiceAction(act, btn, statusEl, row){
    row.querySelectorAll("button").forEach(function(b){ b.disabled=true; });
    statusEl.textContent="Working…";
    fetch(API_BASE+"/action",{method:"POST",headers:{"content-type":"application/json"},
      body:JSON.stringify({tool:act.tool,args:act.args||{}})})
      .then(function(r){ return r.json(); })
      .then(function(r){ statusEl.textContent=(r&&r.result)?r.result:"Done"; })
      .catch(function(){ statusEl.textContent="Couldn't do that"; })
      .finally(function(){ row.querySelectorAll("button").forEach(function(b){ b.disabled=false; }); });
  }
  function showChoicesCard(msg){
    if(!msg||!msg.items||!msg.items.length) return;
    try{ showOrb(); }catch(e){}
    var cards=document.getElementById("cards"); if(!cards) return;
    clearChoices();
    var top=msg.items.slice(0,3);   // a glanceable preview — say/scroll for the rest
    var el=document.createElement("div"); el.className="card"; el.id="choices-card";
    el.setAttribute("role","group");
    el.setAttribute("aria-labelledby","ch-ttl");
    el.innerHTML='<div class="hd"><div class="ic" aria-hidden="true">🔎</div>'
      + '<div class="tx"><div class="ttl" id="ch-ttl"></div></div></div>'
      + '<div class="list"></div>';
    el.querySelector(".ttl").textContent = msg.title || "Top matches";
    var list=el.querySelector(".list");
    top.forEach(function(item,i){
      var it=document.createElement("div"); it.className="citem"; it.setAttribute("role","group");
      var name=document.createElement("div"); name.className="cname";
      name.textContent=(i+1)+". "+(item.label||""); it.appendChild(name);
      if(item.sublabel){ var s=document.createElement("div"); s.className="csub"; s.textContent=item.sublabel; it.appendChild(s); }
      var row=document.createElement("div"); row.className="crow";
      var status=document.createElement("div"); status.className="cstatus";
      status.setAttribute("role","status"); status.setAttribute("aria-live","polite");
      (item.actions||[]).forEach(function(act){
        if(act.copy!=null) return;   // "copy path" is a chat affordance; skip on the orb
        var b=document.createElement("button"); b.type="button"; b.className="btn"; b.textContent=act.label||"Open";
        b.setAttribute("aria-label",(act.label||"Open")+" "+(item.label||"file"));
        b.addEventListener("click",function(){ runChoiceAction(act,b,status,row); });
        row.appendChild(b);
      });
      it.appendChild(row); it.appendChild(status); list.appendChild(it);
    });
    var more=msg.items.length-top.length;
    var hint=document.createElement("div"); hint.className="hint";
    hint.textContent=(more>0?("+"+more+" more · "):"")+"say “open the first one”.";
    el.appendChild(hint);
    cards.appendChild(el);
    enterCardMode();
    announce((msg.title||"Top matches")+", "+top.length+(top.length===1?" result.":" results."));
    setTimeout(function(){ var b=el.querySelector(".btn"); if(b) b.focus(); }, 50);
  }

  // --- window sizing for cards (Tauri) -------------------------------------
  // The orb window is tiny (240px); a notification needs room. While a card is up we
  // widen the window to a readable width, stack the orb above the card (see the
  // body.has-card CSS), then size the height to fit — restoring both on dismiss.
  var CARD_W=340, _baseSize=null;
  function cardsPresent(){ var c=document.getElementById("cards"); return !!(c && c.children.length); }
  function enterCardMode(){
    document.body.classList.add("has-card");
    sizeWindowForCards();
  }
  function exitCardMode(){
    document.body.classList.remove("has-card");
    restoreSize();
  }
  function sizeWindowForCards(){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalSize) return;
    var dprNow=Math.min(window.devicePixelRatio||1,2);
    tauriWin.outerSize().then(function(sz){
      if(!_baseSize) _baseSize={w:sz.width,h:sz.height};
      var w=Math.round(CARD_W*dprNow);
      suppressSave=true;
      tauriWin.setSize(new tauriApi.PhysicalSize(w, sz.height));   // widen first, let it reflow
      requestAnimationFrame(function(){
        var h=Math.round((document.body.scrollHeight+8)*dprNow);
        tauriWin.setSize(new tauriApi.PhysicalSize(w, h));
        try{ ensureOnScreen(); }catch(e){}    // nudge back if widening ran off the edge
        setTimeout(function(){ suppressSave=false; }, 200);
      });
    }).catch(function(){});
  }
  function restoreSize(){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalSize||!_baseSize){ _baseSize=null; return; }
    suppressSave=true;
    try{ tauriWin.setSize(new tauriApi.PhysicalSize(_baseSize.w,_baseSize.h)); }catch(e){}
    try{ ensureOnScreen(); }catch(e){}
    _baseSize=null;
    setTimeout(function(){ suppressSave=false; }, 200);
  }

  // Keyboard support for cards: Esc cancels a confirmation / dismisses a preview;
  // Tab is trapped inside the open card so focus can't wander behind it.
  document.addEventListener("keydown",function(e){
    var confirm=document.getElementById("confirm-card");
    var choices=document.getElementById("choices-card");
    var card=confirm||choices; if(!card) return;
    if(e.key==="Escape"){
      e.preventDefault();
      if(confirm) sendConfirm(false); else clearChoices();
      return;
    }
    if(e.key==="Tab"){
      var btns=card.querySelectorAll("button"); if(!btns.length) return;
      var first=btns[0], last=btns[btns.length-1], a=document.activeElement;
      if(e.shiftKey && (a===first || !card.contains(a))){ e.preventDefault(); last.focus(); }
      else if(!e.shiftKey && (a===last || !card.contains(a))){ e.preventDefault(); first.focus(); }
    }
  });

  // --- "come to me": glide to the active screen when engaged (Tauri only) ----
  // OFF by default: the orb stays parked wherever you put it. Opt in by setting
  // localStorage "jackComeForward" to "1" to have it glide to centre-top while
  // engaged and slide back when done.
  var tauriApi=null,tauriWin=null,suppressSave=false,parkedPos=null,animTok=0;
  var ENGAGED={listening:1,thinking:1,talking:1};
  function comeForwardEnabled(){ try{return localStorage.getItem("jackComeForward")==="1";}catch(e){return false;} }
  // --- state earcons -----------------------------------------------------
  // A short, distinct tone per state so the user can HEAR the status
  // (listening / thinking / talking) — not rely on the orb's color alone.
  // Web Audio only (no asset, on-device). The daemon only drives the orb in
  // VOICE mode (chat turns are skipped server-side), so these stay voice-only.
  // Disable by setting localStorage "jackEarcons" to "0".
  var _ac=null,_acGain=null,_lastEar={s:"",t:0};
  function earconsEnabled(){ try{return localStorage.getItem("jackEarcons")!=="0";}catch(e){return true;} }
  function audioCtx(){
    if(_ac) return _ac;
    try{var Ctx=window.AudioContext||window.webkitAudioContext;if(!Ctx)return null;
      _ac=new Ctx();_acGain=_ac.createGain();_acGain.gain.value=0.30;_acGain.connect(_ac.destination);}catch(e){_ac=null;}
    return _ac;
  }
  function blip(freq,start,dur,peak,type){
    var ac=audioCtx();if(!ac)return;
    var o=ac.createOscillator(),g=ac.createGain();
    o.type=type||"sine";o.frequency.value=freq;o.connect(g);g.connect(_acGain);
    var t0=ac.currentTime+start;
    g.gain.setValueAtTime(0.0001,t0);
    g.gain.exponentialRampToValueAtTime(peak,t0+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.start(t0);o.stop(t0+dur+0.02);
  }
  // Rising pair = listening (I hear you), falling double-tick = thinking (working).
  // No "talking" cue on purpose: the spoken reply itself signals speaking, so a chime
  // would just step on the start of Jack's voice.
  var _EARCON={
    listening:function(){blip(659.25,0,0.14,0.9,"sine");blip(987.77,0.09,0.18,0.8,"sine");},
    thinking:function(){blip(440,0,0.07,0.95,"triangle");blip(440,0.18,0.08,0.9,"triangle");},  // two-tick cue (web-style), louder so it's clearly audible
  };
  function playEarcon(next){
    if(!earconsEnabled())return;
    var fn=_EARCON[next];if(!fn)return;                     // idle has no cue
    var now=Date.now();
    if(_lastEar.s===next&&(now-_lastEar.t)<1500)return;     // debounce VAD flutter / repeats
    var ac=audioCtx();if(!ac)return;
    if(ac.state==="suspended"){try{ac.resume();}catch(e){}}
    _lastEar={s:next,t:now}; fn();
  }
  // Some webviews start the audio context suspended until a gesture; resume once.
  ["pointerdown","keydown"].forEach(function(ev){window.addEventListener(ev,function(){var ac=audioCtx();if(ac&&ac.state==="suspended"){try{ac.resume();}catch(e){}}},{once:true,passive:true});});

  // Mode-switch cue, invoked by the native shell (close_chat) when the user flips
  // chat<->voice. Played HERE on the orb because it's the visible surface then — the
  // chat webview is hidden on switch, so its audio context is suspended and silent.
  // Ascending = voice on, descending = back to chat. resume().then() covers the
  // brief window where the orb was just shown.
  function playModeEarcon(mode){
    if(!earconsEnabled()) return;
    var ac=audioCtx(); if(!ac) return;
    var go=function(){
      if(mode==="chat"){ blip(880,0,0.12,0.7,"sine"); blip(587.33,0.10,0.16,0.7,"sine"); }
      else { blip(587.33,0,0.14,0.85,"sine"); blip(880,0.10,0.20,0.8,"sine"); }
    };
    if(ac.state==="suspended"){ ac.resume().then(go).catch(go); } else { go(); }
  }
  window.__modeEarcon = playModeEarcon;

  function onStateChange(prev,next){
    playEarcon(next);   // audible status cue, alongside the orb's color/animation
    // A new turn began (the user spoke / Jack is working): drop any search preview
    // from the previous turn so it doesn't linger over a fresh interaction.
    if(prev==="idle" && (next==="listening"||next==="thinking")) clearChoices();
    if(!tauriWin) return;
    // Presence: any engaged state shows the orb (this is how the wake word brings
    // it back); returning to idle either honors a pending dismiss or restarts the
    // idle auto-hide countdown.
    if(next!=="idle") showOrb();
    else if(pendingHide) hideOrb();
    else scheduleIdleHide();
    // Come-to-me glide (independent feature, separately toggleable).
    if(comeForwardEnabled()){
      var was=ENGAGED[prev],now=ENGAGED[next];
      if(!was&&now) comeForward();
      else if(was&&!now) goBack();
    }
  }

  // --- auto-hide on idle + dismiss-by-voice (Tauri only) -----------------
  // The orb tucks itself away after a spell of inactivity and reappears the
  // moment Jack is engaged again (the wake word). Saying "go away" hides it too,
  // but only after Jack finishes the goodbye — so we defer the hide until idle.
  var IDLE_HIDE_MS=30000, idleTimer=null, orbHidden=false, pendingHide=false;
  function autoHideEnabled(){ try{return localStorage.getItem("jackAutoHide")!=="0";}catch(e){return true;} }
  function hideOrb(){
    pendingHide=false; clearTimeout(idleTimer); idleTimer=null;
    if(!tauriWin||orbHidden) return;
    orbHidden=true; if(tauriWin.hide) tauriWin.hide();
  }
  // If the orb's saved/default position lands outside every monitor (e.g. a stale
  // position from another display, or the default x is wider than this screen), it's
  // invisible. Reposition it to the top-right of the primary monitor when that happens.
  function ensureOnScreen(){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalPosition||!tauriApi.availableMonitors||!tauriApi.primaryMonitor) return;
    Promise.all([tauriWin.outerPosition(),tauriWin.outerSize(),tauriApi.availableMonitors()]).then(function(r){
      var pos=r[0],size=r[1],mons=r[2]||[];
      if(!mons.length) return;
      var fits=mons.some(function(m){
        var mp=m.position,ms=m.size;
        return pos.x>=mp.x-4 && pos.y>=mp.y-4 &&
               pos.x+size.width<=mp.x+ms.width+4 && pos.y+size.height<=mp.y+ms.height+4;
      });
      if(fits) return;
      tauriApi.primaryMonitor().then(function(m){
        if(!m) return;
        var sc=m.scaleFactor||1;
        var x=m.position.x+Math.max(0,m.size.width-size.width-Math.round(20*sc));
        var y=m.position.y+Math.round(56*sc);
        tauriWin.setPosition(new tauriApi.PhysicalPosition(x,y));
      }).catch(function(){});
    }).catch(function(){});
  }

  function showOrb(){
    clearTimeout(idleTimer); idleTimer=null;
    // Always (re)show — the global shortcut / tray can hide the window at the OS
    // level without going through hideOrb(), leaving orbHidden stale; trusting that
    // flag would make a voice wake fail to bring the orb back.
    if(!tauriWin) return;
    orbHidden=false;
    if(tauriWin.show) tauriWin.show();
    ensureOnScreen();   // a stale/off-screen saved position would make it invisible
    // Do NOT re-set always-on-top / visible-on-all-workspaces here. The orb is an
    // NSPanel whose window level and collection behavior (incl. the full-screen-
    // auxiliary bit) are configured ONCE natively (make_floating_panel). Re-setting
    // them through the standard window API resets the panel's collection behavior —
    // which is exactly what left the orb not appearing on the switch to voice.
  }
  function scheduleIdleHide(){
    clearTimeout(idleTimer); idleTimer=null;
    if(!tauriWin||!autoHideEnabled()) return;
    idleTimer=setTimeout(hideOrb,IDLE_HIDE_MS);
  }
  function requestHide(){
    if(!tauriWin) return;
    if(state==="idle") hideOrb(); else pendingHide=true;  // wait for the goodbye
  }
  function glideTo(tx,ty){
    if(!tauriWin||!tauriApi||!tauriApi.PhysicalPosition) return;
    var P=tauriApi.PhysicalPosition,tok=++animTok;
    tauriWin.outerPosition().then(function(cur){
      var sx=cur.x,sy=cur.y,steps=18,i=0;suppressSave=true;
      (function step(){
        if(tok!==animTok) return;
        i++;var e=i/steps,k=1-Math.pow(1-e,3);
        tauriWin.setPosition(new P(Math.round(sx+(tx-sx)*k),Math.round(sy+(ty-sy)*k)));
        if(i>=steps){ setTimeout(function(){ if(tok===animTok) suppressSave=false; },150); return; }
        setTimeout(step,16);
      })();
    }).catch(function(){});
  }
  function comeForward(){
    if(!tauriApi.currentMonitor) return;
    Promise.all([tauriWin.outerPosition(),tauriApi.currentMonitor(),tauriWin.outerSize()]).then(function(r){
      if(!parkedPos) parkedPos=r[0];
      var mon=r[1],sz=r[2]; if(!mon) return;
      var tx=mon.position.x+Math.round((mon.size.width-sz.width)/2);
      var ty=mon.position.y+Math.round(mon.size.height*0.18);
      glideTo(tx,ty);
    }).catch(function(e){console.warn("comeForward",e);});
  }
  function goBack(){
    if(!parkedPos) return;
    var p=parkedPos;parkedPos=null;glideTo(p.x,p.y);
  }

  window.addEventListener("resize",size);
  // The orb can launch hidden (chat-first), so at first paint c.clientWidth is 0 and
  // the canvas/viewport size to 0 — and a window 'resize' never fires when it's later
  // surfaced (its size didn't change), so it'd stay blank. Re-run size() whenever the
  // canvas actually gains/changes size (i.e. when the orb becomes visible).
  if(window.ResizeObserver){ try{ new ResizeObserver(size).observe(c); }catch(e){} }
  size();connect();frame();

  // --- Tauri shell integration (no-op in a plain browser) ----------------
  // When loaded inside the Tauri window (withGlobalTauri), make the page
  // transparent, hide the dev hint, keep it floating on top of every Space, and
  // let the user drag the orb anywhere by grabbing it.
  if (window.__TAURI__ && window.__TAURI__.window){
    try{
      document.body.style.background="transparent";
      if(conn) conn.style.display="none";
      var api=window.__TAURI__.window;
      var win=(api.getCurrentWindow||api.getCurrent).call(api);
      tauriApi=api; tauriWin=win;   // shared with the "come to me" glide logic
      window.__showOrb = showOrb;   // let the shell (close_chat / ⌘⌃V) re-show + resync JS state
      if(win.setAlwaysOnTop) win.setAlwaysOnTop(true);
      if(win.setVisibleOnAllWorkspaces) win.setVisibleOnAllWorkspaces(true);
      var stage=document.querySelector(".stage");
      if(stage) stage.addEventListener("mousedown",function(){ if(win.startDragging) win.startDragging(); });

      // Remember where the user parked the orb (persists across launches via the
      // webview's localStorage). onMoved gives a physical-pixel position.
      var POS_KEY="jackOrbPos", PhysPos=api.PhysicalPosition;
      try{
        var saved=JSON.parse(localStorage.getItem(POS_KEY)||"null");
        if(saved && PhysPos && typeof saved.x==="number") win.setPosition(new PhysPos(saved.x,saved.y));
      }catch(e){}
      ensureOnScreen();   // clamp onto a real monitor if the saved/default pos is off-screen
      if(win.onMoved) win.onMoved(function(ev){
        if(suppressSave) return;   // ignore programmatic glides — keep the parked spot
        var p=ev&&ev.payload?ev.payload:ev;
        if(p && typeof p.x==="number") localStorage.setItem(POS_KEY, JSON.stringify({x:p.x,y:p.y}));
      });

      // Remember the chosen size too (set from the tray's Small/Medium/Large).
      var SIZE_KEY="jackOrbSize", PhysSize=api.PhysicalSize;
      try{
        var sz=JSON.parse(localStorage.getItem(SIZE_KEY)||"null");
        if(sz && PhysSize && typeof sz.w==="number") win.setSize(new PhysSize(sz.w,sz.h));
      }catch(e){}
      if(win.onResized) win.onResized(function(ev){
        var s=ev&&ev.payload?ev.payload:ev;
        if(s && typeof s.width==="number") localStorage.setItem(SIZE_KEY, JSON.stringify({w:s.width,h:s.height}));
      });

      // Fresh launch: only arm the auto-hide if the orb is actually visible. In
      // chat-first mode the orb launches hidden, so arming it would (30s later) flip
      // the JS "hidden" flag and then fight close_chat when the user switches to
      // voice — leaving the orb stuck hidden. Gate on real OS-level visibility.
      if(win.isVisible){
        win.isVisible().then(function(v){ if(v) scheduleIdleHide(); }).catch(function(){});
      } else {
        scheduleIdleHide();
      }
    }catch(e){ console.warn("tauri init failed",e); }
  }
})();
</script>
</body>
</html>
