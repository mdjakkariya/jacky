<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jack — Chat</title>
<style>
  :root{
    --bg:rgba(245,245,247,.86); --panel:#ffffff; --text:#1d1d1f; --muted:#86868b;
    --line:rgba(0,0,0,.08); --field:#f1f1f3; --field-line:rgba(0,0,0,.12);
    --accent:#0a84ff; --accent-bg:rgba(10,132,255,.14); --danger:#d70015; --danger-bg:rgba(215,0,21,.12);
    --bubble:rgba(0,0,0,.05); --seg:rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:rgba(30,30,30,.82); --panel:#2a2a2c; --text:#f5f5f7; --muted:#98989d;
      --line:rgba(255,255,255,.1); --field:#1c1c1e; --field-line:rgba(255,255,255,.14);
      --accent:#0a84ff; --accent-bg:rgba(10,132,255,.22); --danger:#ff6961; --danger-bg:rgba(255,69,58,.18);
      --bubble:rgba(255,255,255,.08); --seg:rgba(255,255,255,.08);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  html{background:transparent}
  body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;
    border-radius:14px;overflow:hidden;border:.5px solid var(--line);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:.5px solid var(--line);-webkit-app-region:drag;}
  header .seg{display:inline-flex;background:var(--seg);border-radius:8px;padding:2px;-webkit-app-region:no-drag;}
  header .seg button{border:none;background:transparent;color:var(--muted);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;}
  header .seg button.on{background:var(--accent-bg);color:var(--accent);font-weight:500;}
  header .title{font-weight:500;font-size:14px;}
  header .x{border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;-webkit-app-region:no-drag;}
  #log{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:82%;font-size:15px;line-height:1.55;padding:10px 13px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word;}
  .me{align-self:flex-end;background:var(--accent-bg);color:var(--accent);border-top-right-radius:4px;}
  .jack{align-self:flex-start;background:var(--bubble);color:var(--text);border-top-left-radius:4px;}
  .typing{align-self:flex-start;background:var(--bubble);border-radius:16px;border-top-left-radius:4px;
    padding:13px 14px;display:flex;align-items:center;gap:5px;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;
    animation:tdot 1.3s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.18s;}
  .typing span:nth-child(3){animation-delay:.36s;}
  @keyframes tdot{0%,70%,100%{transform:translateY(0);opacity:.35;}35%{transform:translateY(-5px);opacity:1;}}
  .confirm{align-self:stretch;background:var(--panel);border:.5px solid var(--field-line);border-radius:8px;padding:11px 12px;}
  .confirm .h{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--danger);margin-bottom:4px;}
  .confirm .b{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
  .confirm .row{display:flex;gap:8px;justify-content:flex-end;}
  .btn{font-size:12px;padding:5px 12px;border-radius:7px;border:.5px solid var(--field-line);background:transparent;color:var(--text);cursor:pointer;}
  .btn.danger{border-color:var(--danger);background:var(--danger-bg);color:var(--danger);}
  footer{padding:12px 14px 14px;border-top:.5px solid var(--line);}
  .inbar{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--field-line);border-radius:24px;padding:7px 7px 7px 18px;transition:border-color .15s;}
  .inbar:focus-within{border-color:var(--accent);}
  #box{flex:1;min-width:0;border:none;background:transparent;color:var(--text);font-size:15px;line-height:26px;resize:none;height:26px;min-height:26px;max-height:130px;outline:none;padding:0;margin:0;display:block;}
  #box::placeholder{color:var(--muted);}
  #send{border:none;width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:opacity .15s,transform .08s;}
  #send:disabled{opacity:.35;cursor:default;}
  #send:not(:disabled):active{transform:scale(.94);}
  .hidden{display:none !important;}
</style>
</head>
<body>
  <header>
    <span class="title">Jack</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <div class="seg">
        <button id="m-voice">Voice</button>
        <button id="m-chat" class="on">Chat</button>
      </div>
      <button class="x" id="close" aria-label="Hide">✕</button>
    </div>
  </header>
  <div id="log"></div>
  <footer>
    <div class="inbar">
      <textarea id="box" rows="1" placeholder="Message Jack…"></textarea>
      <button id="send" aria-label="Send" disabled>↑</button>
    </div>
  </footer>
<script>
(function(){
  var WS_URL = "ws://127.0.0.1:8765/ws";
  var API = WS_URL.replace(/^ws/, "http").replace(/\/ws$/, "");
  var $ = function(id){ return document.getElementById(id); };
  var log = $("log"), box = $("box"), send = $("send");

  function scroll(){ log.scrollTop = log.scrollHeight; }
  function bubble(cls, text){
    var d = document.createElement("div"); d.className = "msg " + cls; d.textContent = text;
    log.appendChild(d); scroll(); return d;
  }
  function typing(){
    var d = document.createElement("div"); d.className = "typing";
    d.setAttribute("aria-label", "Jack is typing");
    d.innerHTML = "<span></span><span></span><span></span>";
    log.appendChild(d); scroll(); return d;
  }

  async function submit(){
    var text = box.value.trim();
    if(!text) return;
    box.value = ""; resize(); send.disabled = true;
    bubble("me", text);
    var t = typing();
    try {
      var r = await (await fetch(API + "/chat", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({text: text})})).json();
      t.remove();
      bubble("jack", (r && r.reply) ? r.reply : "(no reply)");
    } catch(e){
      t.remove();
      bubble("jack", "Couldn't reach Jack — is it running?");
    }
  }

  function resize(){ box.style.height = "26px"; box.style.height = Math.min(130, box.scrollHeight) + "px"; }
  box.addEventListener("input", function(){ resize(); send.disabled = !box.value.trim(); });
  box.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); submit(); }
  });
  send.addEventListener("click", submit);

  // Confirmation cards arrive over the WebSocket (same events the orb uses).
  function showConfirm(prompt){
    var card = document.createElement("div"); card.className = "confirm"; card.id = "confirm-card";
    card.innerHTML = '<div class="h">⚠️ Just checking</div><div class="b"></div>'
      + '<div class="row"><button class="btn" data-a="0">Cancel</button>'
      + '<button class="btn danger" data-a="1">Yes, do it</button></div>';
    card.querySelector(".b").textContent = prompt || "Do you want me to go ahead with this?";
    card.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click", function(){
        answer(b.getAttribute("data-a") === "1"); card.remove();
      });
    });
    log.appendChild(card); scroll();
  }
  function clearConfirm(){ var c = $("confirm-card"); if(c) c.remove(); }
  async function answer(ok){
    try { await fetch(API + "/confirm", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({answer: ok})}); } catch(e){}
  }

  function connect(){
    try {
      var ws = new WebSocket(WS_URL);
      ws.onmessage = function(ev){
        var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
        if(m.type === "confirm") showConfirm(m.text);
        else if(m.type === "confirm_clear") clearConfirm();
      };
      ws.onclose = function(){ setTimeout(connect, 1500); };
    } catch(e){ setTimeout(connect, 1500); }
  }
  connect();

  // Engine interaction_mode tracks the drawer: chat while it's open (so the voice
  // loop idles and the confirmer is click-only), voice once it closes (so the orb
  // listens again). This is what stops the voice loop and a chat turn from both
  // grabbing the mic at once.
  async function setMode(mode){
    try {
      await fetch(API + "/settings", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({interaction_mode: mode})});
    } catch(e){}
  }

  // Restore voice mode *before* the orb comes back, then hide the drawer.
  async function closeDrawer(){
    await setMode("voice");
    if(window.__TAURI__ && window.__TAURI__.core){
      window.__TAURI__.core.invoke("close_chat").catch(function(){});
    }
  }

  $("m-voice").addEventListener("click", closeDrawer);
  $("m-chat").addEventListener("click", function(){ setMode("chat"); });
  $("close").addEventListener("click", closeDrawer);

  // Opening the drawer = entering chat mode (pauses the voice loop). Re-assert on
  // focus too, in case a mode POST was missed while the window was hidden.
  setMode("chat");
  window.addEventListener("focus", function(){ setMode("chat"); });
  // If the window goes away by any route (OS close, reload), restore voice so the
  // orb starts listening again — keepalive lets the request finish during unload.
  window.addEventListener("pagehide", function(){
    try {
      fetch(API + "/settings", {method:"POST", headers:{"content-type":"application/json"},
        body: JSON.stringify({interaction_mode:"voice"}), keepalive:true});
    } catch(e){}
  });
  box.focus();
})();
</script>
</body>
</html>
