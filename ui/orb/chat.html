<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jack — Chat</title>
<style>
  :root{
    --bg:rgba(245,245,247,.86); --panel:#ffffff; --text:#1d1d1f; --muted:#86868b;
    --line:rgba(0,0,0,.08); --field:#f1f1f3; --field-line:rgba(0,0,0,.12);
    --accent:#0a84ff; --accent-bg:rgba(10,132,255,.14); --danger:#d70015; --danger-bg:rgba(215,0,21,.12);
    --bubble:rgba(0,0,0,.05); --seg:rgba(0,0,0,.06);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:rgba(30,30,30,.82); --panel:#2a2a2c; --text:#f5f5f7; --muted:#98989d;
      --line:rgba(255,255,255,.1); --field:#1c1c1e; --field-line:rgba(255,255,255,.14);
      --accent:#0a84ff; --accent-bg:rgba(10,132,255,.22); --danger:#ff6961; --danger-bg:rgba(255,69,58,.18);
      --bubble:rgba(255,255,255,.08); --seg:rgba(255,255,255,.08);
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  html{background:transparent}
  body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;position:relative;
    border-radius:14px;overflow:hidden;border:.5px solid var(--line);
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:.5px solid var(--line);cursor:grab;user-select:none;-webkit-user-select:none;}
  header .hgroup{display:flex;align-items:center;gap:8px;}
  header:active{cursor:grabbing;}
  header .seg{display:inline-flex;background:var(--seg);border-radius:8px;padding:2px;-webkit-app-region:no-drag;}
  header .seg button{border:none;background:transparent;color:var(--muted);font-size:12px;padding:4px 10px;border-radius:6px;cursor:pointer;}
  header .seg button.on{background:var(--accent-bg);color:var(--accent);font-weight:500;}
  header .title{font-weight:500;font-size:14px;}
  .ctx{display:none;align-items:center;gap:5px;margin-left:12px;-webkit-app-region:no-drag;}
  .ctx.show{display:inline-flex;} .ctx svg{display:block;width:14px;height:14px;}
  .ctx.dev{cursor:pointer;} .ctx .pct{font-size:11px;line-height:1;color:var(--muted);}
  .ctx-detail{position:absolute;top:46px;left:12px;z-index:6;background:var(--panel);border:.5px solid var(--field-line);
    border-radius:10px;padding:9px 11px;min-width:180px;box-shadow:0 6px 20px rgba(0,0,0,.35);}
  .ctx-detail .t{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--text);margin-bottom:7px;}
  .ctx-detail .t svg{width:14px;height:14px;flex:none;opacity:.85;}
  .ctx-detail .r{display:flex;justify-content:space-between;font-size:11.5px;color:var(--muted);gap:14px;margin-top:3px;}
  .ctx-detail .r b{font-weight:500;color:var(--text);font-variant-numeric:tabular-nums;}
  .ctx-detail .note{font-size:11px;color:var(--muted);margin-top:8px;opacity:.8;}
  header .x{border:none;background:transparent;color:var(--muted);font-size:16px;cursor:pointer;-webkit-app-region:no-drag;display:inline-flex;align-items:center;}
  header .x:hover{color:var(--text);}
  header .x svg{width:16px;height:16px;display:block;}
  #log{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;}
  #log > *{flex-shrink:0;}
  .msg{max-width:82%;font-size:15px;line-height:1.55;padding:10px 13px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word;}
  .me{align-self:flex-end;background:var(--accent-bg);color:var(--accent);border-top-right-radius:4px;}
  .jack{align-self:flex-start;background:var(--bubble);color:var(--text);border-top-left-radius:4px;}
  .msg.clamped{position:relative;max-height:150px;overflow:hidden;}
  .msg.clamped::after{content:"";position:absolute;left:0;right:0;bottom:0;height:34px;pointer-events:none;
    background:linear-gradient(transparent,rgba(0,0,0,.32));border-radius:0 0 16px 16px;}
  .more{border:none;background:none;color:var(--accent);font-size:12px;cursor:pointer;padding:0 2px;margin-top:-3px;align-self:flex-end;}
  .counter{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--muted);background:var(--panel);
    border:.5px solid var(--field-line);border-radius:10px;padding:2px 8px;display:none;}
  .counter.show{display:block;} .counter.warn{color:var(--danger);border-color:var(--danger);}
  .jump{position:absolute;left:50%;transform:translateX(-50%);bottom:82px;width:32px;height:32px;border-radius:50%;border:.5px solid var(--field-line);
    background:var(--panel);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .typing{align-self:flex-start;background:var(--bubble);border-radius:16px;border-top-left-radius:4px;
    padding:13px 14px;display:flex;align-items:center;gap:5px;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--muted);display:inline-block;
    animation:tdot 1.3s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.18s;}
  .typing span:nth-child(3){animation-delay:.36s;}
  @keyframes tdot{0%,70%,100%{transform:translateY(0);opacity:.35;}35%{transform:translateY(-5px);opacity:1;}}
  .confirm{align-self:stretch;background:var(--panel);border:.5px solid var(--field-line);border-radius:8px;padding:11px 12px;}
  .confirm .h{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:500;color:var(--danger);margin-bottom:4px;}
  .confirm .b{font-size:12.5px;color:var(--muted);line-height:1.5;margin-bottom:10px;}
  .confirm .row{display:flex;gap:8px;justify-content:flex-end;}
  .btn{font-size:12px;padding:5px 12px;border-radius:7px;border:.5px solid var(--field-line);background:transparent;color:var(--text);cursor:pointer;}
  .btn.danger{border-color:var(--danger);background:var(--danger-bg);color:var(--danger);}
  footer{padding:12px 14px 14px;border-top:.5px solid var(--line);position:relative;}
  .inbar{display:flex;align-items:center;gap:8px;background:var(--field);border:1px solid var(--field-line);border-radius:24px;padding:7px 7px 7px 18px;transition:border-color .15s;}
  .inbar:focus-within{border-color:var(--accent);}
  #box{flex:1;min-width:0;border:none;background:transparent;color:var(--text);font-size:15px;line-height:26px;resize:none;height:26px;min-height:26px;max-height:130px;outline:none;padding:0;margin:0;display:block;}
  #box::placeholder{color:var(--muted);}
  #box:disabled{opacity:.5;}
  #send{border:none;width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;font-size:18px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:none;transition:opacity .15s,transform .08s;}
  #send:disabled{opacity:.35;cursor:default;}
  #send:not(:disabled):active{transform:scale(.94);}
  /* Fresh-session welcome: a greeting + tappable suggestion chips, so the first
     thing you see isn't a blank pane. Removed the moment a message is sent. */
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 24px;}
  .empty .mark{width:48px;height:48px;border-radius:50%;background:var(--accent-bg);display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
  .empty .mark svg{width:24px;height:24px;color:var(--accent);}
  .empty h2{font-size:17px;font-weight:600;margin:0 0 8px;color:var(--text);}
  .empty p{font-size:12.5px;color:var(--muted);line-height:1.5;max-width:230px;margin:0 0 32px;}
  .empty-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:300px;}
  .chip{display:flex;flex-direction:column;align-items:flex-start;background:var(--bubble);border:.5px solid var(--field-line);
    border-radius:12px;padding:14px;text-align:left;cursor:pointer;color:var(--text);font:inherit;transition:border-color .12s,background .12s;}
  .chip:hover{border-color:var(--accent);background:var(--accent-bg);}
  .chip .ci{width:20px;height:20px;color:var(--accent);margin-bottom:11px;}
  .chip .cl{display:-webkit-box;-webkit-line-clamp:2;line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    width:100%;font-size:13px;font-weight:500;line-height:1.25;}
  .chip .ce{display:block;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.25;}
  .spinner{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--field-line);border-top-color:var(--accent);animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .hidden{display:none !important;}
</style>
</head>
<body>
  <header>
    <div class="hgroup">
      <span class="title">Jack</span>
      <button class="x" id="newchat" aria-label="New chat" title="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/><path d="M18.4 2.6a2 2 0 0 1 2.8 2.8L12.5 14l-3.7 1 1-3.7z"/></svg>
      </button>
      <span id="ctx" class="ctx" aria-label="Context used">
        <svg width="16" height="16" viewBox="0 0 36 36" aria-hidden="true"><circle cx="18" cy="18" r="15" fill="none" stroke="var(--field-line)" stroke-width="5"/><circle id="ctxArc" cx="18" cy="18" r="15" fill="none" stroke="#7fb87a" stroke-width="5" stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="94.2" transform="rotate(-90 18 18)"/></svg>
        <span id="ctxPct" class="pct">0%</span>
      </span>
    </div>
    <div class="hgroup">
      <div class="seg">
        <button id="m-voice">Voice</button>
        <button id="m-chat" class="on">Chat</button>
      </div>
      <button class="x" id="close" aria-label="Hide">✕</button>
    </div>
  </header>
  <div id="ctxDetail" class="ctx-detail hidden"></div>
  <div id="log">
    <div id="empty" class="empty">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg>
      </div>
      <h2>Hey, I'm Jack</h2>
      <p>Your on-device assistant. Ask me anything, or start with one of these.</p>
      <div class="empty-grid">
        <button class="chip" data-send="Open GitHub in my browser">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <span class="cl">Open a website</span><span class="ce">"open GitHub"</span>
        </button>
        <button class="chip" data-send="How's my battery?">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="8" width="15" height="8" rx="2"/><path d="M21 11v2"/><path d="M7 11v2M10 11v2"/></svg>
          <span class="cl">Check my system</span><span class="ce">"how's my battery?"</span>
        </button>
        <button class="chip" data-send="Remember that I prefer concise answers">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z"/></svg>
          <span class="cl">In memory</span><span class="ce">"remember a fact"</span>
        </button>
        <button class="chip" data-send="Search the web for what's new in AI">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <span class="cl">Search the web</span><span class="ce">"what's new in…"</span>
        </button>
      </div>
    </div>
  </div>
  <button id="jump" class="jump hidden" aria-label="Jump to latest">↓</button>
  <footer>
    <div class="inbar">
      <textarea id="box" rows="1" maxlength="4000" placeholder="⌘⌃J summon · Esc to close"></textarea>
      <button id="send" aria-label="Send" disabled>↑</button>
    </div>
    <div id="counter" class="counter"></div>
  </footer>
<script>
(function(){
  var WS_URL = "ws://127.0.0.1:8765/ws";
  var API = WS_URL.replace(/^ws/, "http").replace(/\/ws$/, "");
  var $ = function(id){ return document.getElementById(id); };
  var log = $("log"), box = $("box"), send = $("send");

  // Smart scroll: only follow new messages when already near the bottom, so reading
  // history isn't yanked away. A "jump to latest" button appears when scrolled up.
  var jump = $("jump");
  function nearBottom(){ return log.scrollHeight - log.scrollTop - log.clientHeight < 80; }
  function updateJump(){ jump.classList.toggle("hidden", nearBottom()); }
  function toBottom(){ log.scrollTop = log.scrollHeight; updateJump(); }
  function scroll(){ if(nearBottom()) log.scrollTop = log.scrollHeight; updateJump(); }

  // Collapse very long messages behind a "Show more" so one big paste doesn't fill
  // the whole drawer.
  function clampIfLong(d, cls){
    if(cls !== "me") return;  // only collapse long user pastes; never Jack's replies
    if(d.scrollHeight <= 160) return;  // measure natural height first; short -> leave it
    d.classList.add("clamped");
    var b = document.createElement("button"); b.className = "more"; b.textContent = "Show more";
    b.addEventListener("click", function(){
      var clamped = d.classList.toggle("clamped");
      b.textContent = clamped ? "Show more" : "Show less";
      updateJump();
    });
    d.insertAdjacentElement("afterend", b);
  }
  // The fresh-session welcome lives in #log; drop it as soon as the conversation
  // starts, and re-render it for a new chat. Keep a pristine clone as the template.
  var emptyTpl = $("empty").cloneNode(true);
  function removeEmpty(){ var e = $("empty"); if(e) e.remove(); }
  function bindChips(root){
    Array.prototype.forEach.call(root.querySelectorAll(".chip"), function(chip){
      chip.addEventListener("click", function(){
        if(busy) return;
        box.value = chip.getAttribute("data-send") || "";
        resize(); updateCounter(); submit();
      });
    });
  }
  function showEmpty(){
    log.innerHTML = "";
    var n = emptyTpl.cloneNode(true);
    log.appendChild(n); bindChips(n);
  }
  // Startup: the daemon takes a moment to come up. Show a centered "Starting…" and
  // keep the composer disabled until /healthz answers, instead of letting a typed
  // message fail with "Jack isn't running".
  function showInitializing(){
    log.innerHTML = '<div class="empty">'
      + '<div class="spinner" aria-hidden="true" style="margin-bottom:16px"></div>'
      + '<h2>Starting Jack…</h2>'
      + '<p>Getting things ready — just a moment.</p></div>';
  }
  function bubble(cls, text){
    removeEmpty();
    var d = document.createElement("div"); d.className = "msg " + cls; d.textContent = text;
    log.appendChild(d); clampIfLong(d, cls); scroll(); return d;
  }
  bindChips(log);  // wire the chips already in the DOM
  // A single, shared typing indicator (never more than one).
  var typingEl = null;
  function showTyping(){ if(!typingEl){ typingEl = document.createElement("div"); typingEl.className = "typing"; typingEl.setAttribute("aria-label", "Jack is typing"); typingEl.innerHTML = "<span></span><span></span><span></span>"; log.appendChild(typingEl); } scroll(); }
  function hideTyping(){ if(typingEl){ typingEl.remove(); typingEl = null; } }

  // One turn at a time: while a turn is in flight (including while a confirmation
  // card is waiting for you), lock the input so a second message can't queue up
  // behind it and leave the dots stuck. Answer a confirmation with its buttons.
  var busy = false;
  function lockInput(on){
    busy = on;
    box.disabled = on;
    send.disabled = on || !box.value.trim();
  }

  async function submit(){
    var text = box.value.trim();
    if(busy || !text) return;
    box.value = ""; resize(); updateCounter();
    bubble("me", text);
    toBottom();
    lockInput(true);
    showTyping();
    try {
      var r = await (await fetch(API + "/chat", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({text: text})})).json();
      bubble("jack", (r && r.reply) ? r.reply : "(no reply)");
    } catch(e){
      bubble("jack", "Couldn't reach Jack — is it running?");
    } finally {
      hideTyping();
      clearConfirm();
      lockInput(false);
    }
  }

  function resize(){ box.style.height = "26px"; box.style.height = Math.min(130, box.scrollHeight) + "px"; }
  // Char counter: only appears as you approach the cap (the textarea's maxlength
  // hard-stops at 4000), so a single paste can't blow past the model's context.
  var MAXLEN = 4000, WARN_AT = 200, counter = $("counter");
  function updateCounter(){
    var left = MAXLEN - box.value.length;
    if(left > WARN_AT){ counter.classList.remove("show"); return; }  // hidden until near the cap
    counter.classList.add("show");
    counter.classList.toggle("warn", left <= 0);
    counter.textContent = left > 0 ? (left + " left") : "Limit reached";
  }
  box.addEventListener("input", function(){ resize(); updateCounter(); send.disabled = busy || !box.value.trim(); });
  box.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); submit(); }
  });
  send.addEventListener("click", submit);
  jump.addEventListener("click", toBottom);
  log.addEventListener("scroll", updateJump);

  // Confirmation cards arrive over the WebSocket. The loading dots keep running
  // underneath (the turn is still in flight); the input stays locked, so the card's
  // buttons are how you answer — no second message can queue up behind it.
  function showConfirm(prompt){
    clearConfirm();
    var card = document.createElement("div"); card.className = "confirm"; card.id = "confirm-card";
    card.innerHTML = '<div class="h">⚠️ Just checking</div><div class="b"></div>'
      + '<div class="row"><button class="btn" data-a="0">Cancel</button>'
      + '<button class="btn danger" data-a="1">Yes, do it</button></div>';
    card.querySelector(".b").textContent = prompt || "Do you want me to go ahead with this?";
    card.querySelectorAll("button").forEach(function(b){
      b.addEventListener("click", function(){
        answer(b.getAttribute("data-a") === "1");
        card.remove();
      });
    });
    log.appendChild(card); scroll();
  }
  function clearConfirm(){ var c = $("confirm-card"); if(c){ c.remove(); } }
  async function answer(ok){
    try { await fetch(API + "/confirm", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({answer: ok})}); } catch(e){}
  }

  // Per-session context meter in the header (percent ring; in dev builds, tap the
  // ring to expand a detail card). Driven by the engine's "context" event each turn.
  var CTX_CIRC = 94.2, lastCtx = null;
  function renderContext(m){
    var wrap = $("ctx"), arc = $("ctxArc"), pctEl = $("ctxPct");
    if(!wrap) return;
    lastCtx = m;
    var p = Math.max(0, Math.min(100, Math.round(m.pct || 0)));
    var c = p > 85 ? "var(--danger)" : (p > 60 ? "#e7b15a" : "#7fb87a");
    wrap.classList.add("show");
    wrap.classList.toggle("dev", !!m.dev);
    arc.setAttribute("stroke", c);
    arc.setAttribute("stroke-dashoffset", (CTX_CIRC * (1 - p / 100)).toFixed(1));
    pctEl.textContent = p + "%";
    pctEl.style.color = p > 85 ? "var(--danger)" : "var(--muted)";
    wrap.title = "Context " + p + "% used this session" + (m.dev ? " — tap for detail" : "");
    if(!$("ctxDetail").classList.contains("hidden")) renderCtxDetail();  // live-update if open
  }
  // Compact token counts: 36000 -> "36.0k", 200000 -> "200k", <1000 stays exact.
  function fmtK(n){
    n = n || 0;
    if(n < 1000) return n.toLocaleString();
    var k = n / 1000;
    return (k >= 100 ? Math.round(k) : k.toFixed(1)) + "k";
  }
  // Friendlier model label: "claude-haiku-4-5" -> "haiku-4.5"; locals (e.g. qwen3:8b) pass through.
  function fmtModel(m){ return (m || "—").replace(/^claude-/, "").replace(/-(\d+)-(\d+)$/, "-$1.$2"); }
  var CTX_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14l4-4"/><path d="M5.6 18.5a9 9 0 1 1 12.8 0"/></svg>';
  function renderCtxDetail(){
    var d = $("ctxDetail"); if(!lastCtx) return;
    var p = Math.max(0, Math.min(100, Math.round(lastCtx.pct || 0)));
    var rows = '<div class="t">' + CTX_ICON + '<span>Session context</span></div>'
      + '<div class="r"><span>Used</span><b>' + fmtK(lastCtx.used) + ' / ' + fmtK(lastCtx.window) + '</b></div>'
      + '<div class="r"><span>Window</span><b>' + p + '%</b></div>'
      + '<div class="r"><span>This turn</span><b>' + fmtK(lastCtx.turn_in) + ' in · ' + fmtK(lastCtx.turn_out) + ' out</b></div>';
    if(lastCtx.cache_read != null || lastCtx.cache_write != null){  // cloud only
      rows += '<div class="r"><span>Cache read</span><b>' + fmtK(lastCtx.cache_read) + '</b></div>'
        + '<div class="r"><span>Cache write</span><b>' + fmtK(lastCtx.cache_write) + '</b></div>';
    }
    rows += '<div class="r"><span>Model</span><b>' + fmtModel(lastCtx.model) + '</b></div>';
    var note = p > 85 ? "Compacting soon." : (p > 60 ? "Filling up." : "Plenty of room.");
    rows += '<div class="note">' + note + '</div>';
    d.innerHTML = rows;
  }
  $("ctx").addEventListener("click", function(){
    if(!lastCtx || !lastCtx.dev) return;  // detail is dev-only
    var d = $("ctxDetail"), hidden = d.classList.toggle("hidden");
    if(!hidden) renderCtxDetail();
  });
  // Back to empty for a fresh session: clear the ring and hide the detail card.
  function resetCtx(){
    lastCtx = null;
    var wrap = $("ctx"), arc = $("ctxArc"), pctEl = $("ctxPct");
    if(wrap){ wrap.classList.remove("show", "dev"); }  // hide entirely until the next turn
    if(arc){ arc.setAttribute("stroke-dashoffset", CTX_CIRC.toFixed(1)); arc.setAttribute("stroke", "#7fb87a"); }
    if(pctEl){ pctEl.textContent = "0%"; pctEl.style.color = "var(--muted)"; }
    $("ctxDetail").classList.add("hidden");
  }

  // New chat: discard the engine's conversation, then reset the drawer to a fresh
  // welcome. The UI clears regardless of the request outcome so it never feels stuck.
  async function newChat(){
    if(busy) return;  // a turn is in flight — don't wipe mid-thought
    try { await fetch(API + "/session/new", {method:"POST"}); } catch(e){}
    hideTyping(); clearConfirm();
    showEmpty(); resetCtx();
    box.value = ""; resize(); updateCounter(); lockInput(false); box.focus();
  }
  $("newchat").addEventListener("click", newChat);

  function connect(){
    try {
      var ws = new WebSocket(WS_URL);
      ws.onmessage = function(ev){
        var m; try { m = JSON.parse(ev.data); } catch(e){ return; }
        if(m.type === "confirm") showConfirm(m.text);
        else if(m.type === "confirm_clear") clearConfirm();
        else if(m.type === "context") renderContext(m);
      };
      ws.onclose = function(){ setTimeout(connect, 1500); };
    } catch(e){ setTimeout(connect, 1500); }
  }
  connect();

  // Engine interaction_mode tracks the drawer: chat while it's open (so the voice
  // loop idles and the confirmer is click-only), voice once it closes (so the orb
  // listens again). This is what stops the voice loop and a chat turn from both
  // grabbing the mic at once.
  async function setMode(mode){
    try {
      await fetch(API + "/settings", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({interaction_mode: mode})});
    } catch(e){}
  }

  // Voice is gated on the speech models being downloaded — we never surface the orb
  // without them (it'd be useless). Ask the engine whether voice is ready.
  async function voiceReady(){
    try { return !!(await (await fetch(API + "/voice/status")).json()).ready; }
    catch(e){ return false; }
  }
  function tauri(){ return window.__TAURI__ && window.__TAURI__.core; }

  // The "Voice" toggle: switch to voice + bring the orb back ONLY if the models are
  // present; otherwise send the user to Settings to download them (with progress).
  async function enableVoice(){
    if(await voiceReady()){
      await setMode("voice");
      if(tauri()) tauri().invoke("close_chat").catch(function(){});
    } else if(tauri()){
      tauri().invoke("open_settings_voice").catch(function(){});  // deep-link to the voice download
    }
  }

  // Closing the drawer (✕) means hide/close — nothing else. Clear separation from the
  // Voice toggle: ✕ never switches to voice or surfaces the orb, it just tucks the
  // chat away (staying in chat mode). Summon it back with ⌘⌃J, which restores the
  // last surface (chat).
  async function closeDrawer(){
    await setMode("chat");
    if(tauri()) tauri().invoke("hide_chat").catch(function(){});
  }

  $("m-voice").addEventListener("click", enableVoice);
  $("m-chat").addEventListener("click", function(){ setMode("chat"); });
  $("close").addEventListener("click", closeDrawer);

  // Esc or ⌘W closes the drawer (back to voice) — standard, accessible shortcuts.
  document.addEventListener("keydown", function(e){
    if(e.key === "Escape"){ e.preventDefault(); closeDrawer(); }
    else if((e.metaKey || e.ctrlKey) && (e.key === "w" || e.key === "W")){ e.preventDefault(); closeDrawer(); }
  });

  // Drag the window by its header. CSS app-region is unreliable on frameless macOS
  // windows, so drive Tauri's native startDragging on mousedown — but let the
  // toggle/close controls keep working (don't start a drag from a button).
  var header = document.querySelector("header");
  if(header){
    header.addEventListener("mousedown", function(e){
      if(e.button !== 0) return;
      if(e.target.closest("button, .seg")) return;
      var w = window.__TAURI__ && window.__TAURI__.window;
      if(w && w.getCurrentWindow){ w.getCurrentWindow().startDragging().catch(function(){}); }
    });
  }

  // Opening the drawer = entering chat mode (pauses the voice loop). Re-assert on
  // focus too, in case a mode POST was missed while the window was hidden. Chat is
  // the default, so we no longer force voice on unload — switching to voice is an
  // explicit, gated action (it needs the downloaded models).
  setMode("chat");
  window.addEventListener("focus", function(){ setMode("chat"); });

  // Gate input on the daemon being up: show "Starting…" and keep the composer
  // disabled until /healthz answers, then reveal the welcome and focus the box.
  async function waitForReady(){
    showInitializing();
    lockInput(true);
    for(var i = 0; i < 600; i++){  // ~8 min ceiling; the daemon normally answers in <2s
      try { if((await fetch(API + "/healthz")).ok){ break; } } catch(e){}
      await new Promise(function(res){ setTimeout(res, 800); });
    }
    showEmpty();
    lockInput(false);
    box.focus();
  }
  waitForReady();
})();
</script>
</body>
</html>
