<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jack — Chat</title>
<link rel="stylesheet" href="./styles/chat.css" />
</head>
<body>
  <header>
    <div class="hgroup">
      <button class="x" id="newchat" aria-label="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        <span class="htip">New chat <span class="sc">⌘⌃N</span></span>
      </button>
      <span id="ctx" class="ctx" aria-label="Context used">
        <svg width="16" height="16" viewBox="0 0 36 36" aria-hidden="true"><circle cx="18" cy="18" r="15" fill="none" stroke="var(--field-line)" stroke-width="5"/><circle id="ctxArc" cx="18" cy="18" r="15" fill="none" stroke="#7fb87a" stroke-width="5" stroke-linecap="round" stroke-dasharray="94.2" stroke-dashoffset="94.2" transform="rotate(-90 18 18)"/></svg>
        <span id="ctxPct" class="pct">0%</span>
      </span>
      <button class="x dbg hidden" id="dbg" aria-label="Copy debug report" title="Copy debug report (dev)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 10a3 3 0 0 1 6 0"/><rect x="8" y="9" width="8" height="9" rx="4"/><path d="M8 12H4M16 12h4M8 16l-3 2M16 16l3 2M8.5 9.2 6.5 7M15.5 9.2 17.5 7M12 5V3"/></svg>
        <span class="dbgtip" id="dbgTip">Copied</span>
      </button>
      <span id="folder" class="folder hidden" role="button" tabindex="0"
            aria-label="Active folder" aria-haspopup="true" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span id="folderName" class="fname"></span>
      </span>
    </div>
    <div class="hgroup">
      <div class="seg">
        <button id="m-voice">Voice</button>
        <button id="m-chat" class="on">Chat</button>
      </div>
      <button class="x" id="close" aria-label="Hide">✕<span class="htip htip-end">Hide <span class="sc">Esc</span></span></button>
    </div>
  </header>
  <update-banner id="updateBanner" class="upd hidden">
    <span class="u-text"></span>
    <span class="u-actions"><button class="u-link">What's new ↗</button><button class="u-dismiss">Later</button></span>
  </update-banner>
  <div id="ctxDetail" class="ctx-detail hidden"></div>
  <div id="folderDetail" class="folder-detail hidden">
    <div class="fd-h">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
      Working in
    </div>
    <div id="folderPath" class="fd-path"></div>
    <div id="folderGrants" class="fd-grants"></div>
    <div class="fd-acts">
      <button id="folderReveal" class="primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/></svg>
        Reveal
      </button>
      <button id="folderChange">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
        Change…
      </button>
    </div>
  </div>
  <chat-log id="log">
    <div id="empty" class="empty">
      <div class="mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.6 4.4L18 9l-4.4 1.6L12 15l-1.6-4.4L6 9l4.4-1.6z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg>
      </div>
      <h2>Hey, I'm Jack</h2>
      <p>Your on-device assistant. Ask me anything, or start with one of these.</p>
      <div class="empty-grid">
        <button class="chip" data-send="Open GitHub in my browser">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18"/></svg>
          <span class="cl">Open a website</span><span class="ce">"open GitHub"</span>
        </button>
        <button class="chip" data-send="How's my battery?">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="8" width="15" height="8" rx="2"/><path d="M21 11v2"/><path d="M7 11v2M10 11v2"/></svg>
          <span class="cl">Check my system</span><span class="ce">"how's my battery?"</span>
        </button>
        <button class="chip" data-send="Remember that I prefer concise answers">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 4h12a1 1 0 0 1 1 1v15l-7-4-7 4V5a1 1 0 0 1 1-1z"/></svg>
          <span class="cl">In memory</span><span class="ce">"remember a fact"</span>
        </button>
        <button class="chip" data-send="Search the web for what's new in AI">
          <svg class="ci" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <span class="cl">Search the web</span><span class="ce">"what's new in…"</span>
        </button>
      </div>
    </div>
  </chat-log>
  <button id="jump" class="jump hidden" aria-label="Jump to latest">↓</button>
  <footer>
    <div class="inbar">
      <span id="phHint" aria-hidden="true">Message Jack…</span>
      <textarea id="box" rows="1" maxlength="4000"></textarea>
      <button id="send" aria-label="Send" disabled>↑</button>
    </div>
    <div id="counter" class="counter"></div>
  </footer>
<script type="module" src="./pages/chat.js"></script>
</body>
</html>
