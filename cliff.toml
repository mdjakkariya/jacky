# git-cliff configuration — generates CHANGELOG.md and release notes from
# Conventional Commits. See https://git-cliff.org. Run via `make changelog` /
# `make notes` (and automatically from `make publish-orb`).

[changelog]
# Rendered once at the top of CHANGELOG.md.
header = """
# Changelog

All notable changes to **Jack** are recorded here. The format follows
[Keep a Changelog](https://keepachangelog.com), commits follow
[Conventional Commits](https://www.conventionalcommits.org), and versions follow
[Semantic Versioning](https://semver.org). This file is generated by
[git-cliff](https://git-cliff.org) — don't edit released sections by hand.

"""

# One version block. `version` is unset for the not-yet-tagged "Unreleased" set.
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first | trim }}\
{% if commit.breaking %} **(breaking change)**{% endif %}
{% endfor %}\
{% endfor %}\n
"""

footer = ""
trim = true

[git]
# Only categorize Conventional Commits; drop anything that doesn't match so the
# log stays clean as the project adopts the convention.
conventional_commits = true
filter_unconventional = true
split_commits = false

# Map commit type -> changelog section. The `<!-- N -->` prefixes only set the
# section order (the template strips them with `striptags`).
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->⚡ Performance & Stability" },
  { message = "^refactor", group = "<!-- 3 -->🛠️ Improvements" },
  { message = "^style", group = "<!-- 3 -->🛠️ Improvements" },
  { message = "^docs?", group = "<!-- 4 -->📚 Documentation" },
  { message = "^(chore|build|ci)\\(release\\):", skip = true },
  { message = "^(chore|build|ci)", group = "<!-- 5 -->🔧 Maintenance" },
  { message = "^revert", group = "<!-- 6 -->⏪ Reverts" },
  { body = ".*security", group = "<!-- 1 -->🐛 Bug Fixes" },
]

# Skip release/version-bump commits and merge commits from the changelog.
filter_commits = false
protect_breaking_commits = false
tag_pattern = "v[0-9]*"
skip_tags = "^v0\\.0\\."
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
